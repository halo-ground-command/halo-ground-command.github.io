<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Halo: Ground Command — Force Builder</title>

  <style>
    :root{
      --bg:#0b1220; --panel:#121a2b; --panel2:#0f1626;
      --text:#e8eefc; --muted:#a9b6d8; --line:#273252;
      --good:#35d07f; --warn:#ffcc66; --bad:#ff6b6b;

      --accent:#2f7dff;
      --accent2:#0d2e6f;

      /* PDF helpers (computed/overridden at export time too) */
      --accentLight: rgba(47,125,255,.12);
      --accentLighter: rgba(47,125,255,.08);

      --chip:#1b2a4a;

      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }

    body{ margin:0; background:linear-gradient(180deg,var(--bg),#070b14); color:var(--text); }
    header{
      padding:14px 18px; border-bottom:1px solid var(--line);
      display:flex; gap:12px; align-items:center; justify-content:space-between;
      position:sticky; top:0; background:rgba(9,14,26,.92); backdrop-filter: blur(8px);
      z-index:20;
    }
    header .left{ display:flex; gap:12px; align-items:center; }
    header h1{ font-size:16px; margin:0; font-weight:900; letter-spacing:.2px; }
    header .tag{ font-size:12px; color:var(--muted); padding:3px 8px; border:1px solid var(--line); border-radius:999px; }

    header .right{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .topbtn{
      width:auto; padding:8px 10px; font-size:12px; border-radius:10px;
      border:1px solid #2d3b64; background:linear-gradient(180deg,#1a2b52,#142445);
      color:var(--text); cursor:pointer;
      display:inline-flex; align-items:center; gap:8px;
    }
    .topbtn:hover{ filter:brightness(1.05); }

    main{ display:grid; grid-template-columns: 460px 1fr; gap:14px; padding:14px; }
    @media (max-width: 1100px){ main{ grid-template-columns: 1fr; } }

    .card{ background:var(--panel); border:1px solid var(--line); border-radius:14px; overflow:hidden; }
    .card h2{
      margin:0; font-size:13px; padding:12px 14px;
      background:var(--panel2); border-bottom:1px solid var(--line);
      color:var(--muted); letter-spacing:.4px; text-transform:uppercase;
      display:flex; justify-content:space-between; align-items:center;
    }
    .pad{ padding:12px 14px; }
    label{ display:block; font-size:12px; color:var(--muted); margin:10px 0 6px; }
    input, select, button, textarea{
      width:100%; box-sizing:border-box; background:#0c1424; color:var(--text);
      border:1px solid var(--line); border-radius:10px; padding:10px 10px;
      font-size:14px;
    }
    button{ cursor:pointer; background:linear-gradient(180deg,#1a2b52,#142445); border:1px solid #2d3b64; }
    button:hover{ filter:brightness(1.05); }
    .row{ display:flex; gap:10px; }
    .row > *{ flex:1; }
    .mini{ font-size:12px; color:var(--muted); line-height:1.35; }
    .hr{ height:1px; background:var(--line); margin:12px 0; }

    .pill{ display:inline-flex; gap:6px; align-items:center; padding:4px 10px; border-radius:999px; border:1px solid var(--line); background:rgba(255,255,255,.03); }
    .pill b{ font-weight:900; }
    .good{ color:var(--good); }
    .warn{ color:var(--warn); }
    .bad{ color:var(--bad); }

    .chips{ display:flex; flex-wrap:wrap; gap:6px; }
    .chip{ background:var(--chip); border:1px solid var(--line); padding:4px 8px; border-radius:999px; font-size:12px; color:var(--muted); }

    .bglist{ display:flex; flex-direction:column; gap:10px; }
    .bg{ border:1px solid var(--line); border-radius:12px; overflow:hidden; }
    .bghead{
      display:flex; justify-content:space-between; gap:10px; padding:10px 12px;
      background:#0e1627; border-bottom:1px solid var(--line);
    }
    .bghead .left{ display:flex; flex-direction:column; gap:2px; }
    .bghead .name{ font-weight:900; }
    .bghead .sub{ font-size:12px; color:var(--muted); }

    .bgbody{ padding:10px 12px; display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
    @media (max-width: 1100px){ .bgbody{ grid-template-columns: 1fr; } }

    .slot{ border:1px dashed #324066; border-radius:10px; padding:10px; }
    .slot h3{ margin:0 0 8px; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.3px; }

    .item{
      display:flex; justify-content:space-between; gap:10px; padding:8px 8px;
      border:1px solid var(--line); border-radius:10px; background:#0b1322; margin-top:8px;
    }
    .item .meta{ display:flex; flex-direction:column; gap:2px; width:100%; }
    .item .meta .t{ font-weight:900; }
    .item .meta .s{ font-size:12px; color:var(--muted); }
    .item .btns{ display:flex; gap:6px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
    .tinybtn{ width:auto; padding:6px 10px; font-size:12px; border-radius:9px; }
    .ghostbtn{ background:transparent; border:1px solid var(--line); }
    .accentbtn{
      background:linear-gradient(180deg, rgba(47,125,255,.35), rgba(47,125,255,.15));
      border:1px solid rgba(47,125,255,.55);
    }

    /* NEW: upgrades UI styling */
    .upwrap{
      margin-top:8px;
      padding:8px;
      border:1px solid var(--line);
      border-radius:12px;
      background:rgba(255,255,255,.02);
    }
    .uprow{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      padding:6px 0;
      border-top:1px solid rgba(39,50,82,.6);
    }
    .uprow:first-child{ border-top:none; }
    .uprow label{
      margin:0;
      display:flex;
      gap:8px;
      align-items:center;
      cursor:pointer;
      user-select:none;
      color:var(--text);
      font-size:12px;
    }
    .uprow input[type="checkbox"]{ width:auto; }
    .uphint{ color:var(--muted); font-size:12px; }

    /* NEW: mobile-only collapse support for upgrades */
    .upbody[data-collapsed="1"]{ display:block; } /* default for desktop (overridden on mobile) */

    textarea{
      height:560px; resize:vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size:12px; line-height:1.35;
    }

    /* Print/PDF view */
    .printWrap{
      display:none;
      padding:18px;
      color:#111;
      background:#fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }
    .printTitleBar{
      border-radius:12px;
      padding:12px 14px;
      color:#fff;
      background: var(--accent); /* SOLID, NO GRADIENT */
      margin-bottom:10px;
    }
    .printTitleBar h1{ margin:0; font-size:20px; letter-spacing:.2px; }
    .printTitleBar .sub{ margin-top:6px; opacity:.92; font-size:12px; }

    .printBar{
      display:flex; gap:8px; flex-wrap:wrap;
      margin:10px 0 14px;
    }

    .printBox{
      border:1px solid #cfd4dc; border-radius:12px; padding:12px; margin:12px 0;
      page-break-inside: avoid;
      break-inside: avoid;
    }
    .printBox.split{
      page-break-inside: auto;
      break-inside: auto;
    }

    .printBox h2{ margin:0 0 10px; font-size:14px; }
    .printTable{ width:100%; border-collapse:collapse; font-size:12px; }
    .printTable th,.printTable td{ border:1px solid #d9dde5; padding:8px; vertical-align:top; }
    .printMuted{ color:#555; }

    .printTable thead th,
    .printHeaderRow th{
      background: var(--accent) !important;
      color:#fff !important;
      border-color: rgba(255,255,255,.22) !important;
    }

    .printSectionRow td{
      background: var(--accentLight);
      font-weight: 900;
    }

    .printCmdRow td{
      background: var(--accentLighter);
    }

    .printNoteRow td{ background: rgba(255, 204, 102, .12); }
    .printIssueRow td{
      background: rgba(255, 107, 107, .10);
      color:#7a0000;
    }

    .badge{
      display:inline-block;
      padding:2px 8px;
      border:1px solid #cfd4dc;
      border-radius:999px;
      font-size:11px;
      margin-right:6px;
      white-space:nowrap;
    }
    .badgeReq{ background:#fff; color:#111; border-color:#cfd4dc; }
    .badgeOpt{ background: rgba(0,0,0,.03); color:#111; }
    .badgeMissing{
      background: rgba(255,107,107,.14);
      border-color: rgba(255,107,107,.35);
      color:#7a0000;
    }

    @media print{
      body{ background:#fff !important; }
      .printWrap{ display:block !important; }
      header, main{ display:none !important; }
    }

    /* =========================================================
       MOBILE ONLY (phones) — UI improvements
       ========================================================= */
    @media (max-width: 820px){
      header{
        padding:10px 12px;
        gap:10px;
      }
      header .left{ flex-wrap:wrap; gap:8px; }
      header h1{ font-size:14px; }
      header .tag{ font-size:11px; }

      header .right{
        gap:8px;
        width:100%;
        justify-content:space-between;
      }
      .topbtn{
        padding:10px 12px;
        font-size:13px;
        border-radius:12px;
      }

      main{
        grid-template-columns: 1fr !important;
        padding:10px;
        gap:10px;
      }

      .card{ border-radius:16px; }
      .card h2{
        position:sticky;
        top:56px;     /* keeps section title visible under header */
        z-index:10;
        padding:12px;
      }
      .pad{ padding:12px; }

      /* Prevent iOS zoom on focus + improve tap targets */
      input, select, button, textarea{
        font-size:16px;
        padding:12px 12px;
        border-radius:12px;
      }
      textarea{ height:380px; }

      .bgbody{
        grid-template-columns: 1fr !important;
        gap:10px;
      }

      .item{
        flex-direction:column;
        align-items:stretch;
        gap:8px;
        padding:10px;
        border-radius:14px;
      }
      .item .btns{
        justify-content:flex-start;
      }
      .tinybtn{
        padding:10px 12px;
        font-size:13px;
        border-radius:12px;
      }

      .pill{ padding:6px 10px; font-size:12px; }
      .chips{ gap:8px; }

      .slot{ padding:10px; border-radius:14px; }

      /* Upgrades: make it mobile-sheet friendly */
      .upwrap{ padding:10px; border-radius:14px; }
      .uprow{
        flex-direction:column;
        align-items:stretch;
        gap:8px;
        padding:10px 0;
      }
      .uprow label{ font-size:13px; }
      .uphint{ font-size:12px; }
      .uprow select{ width:100%; }

      /* Collapse upgrade body on mobile */
      .upbody[data-collapsed="1"]{ display:none; }

      /* Better wrapping */
      .bg, .card, .slot, .item { overflow-wrap:anywhere; }

      /* Optional: save space */
      header .tag{ display:none; }
    }
  
    /* =====================================================
       MOBILE IMPROVEMENTS (phones)
       ===================================================== */
    @media (max-width: 640px){
      header{ padding:12px 12px; gap:10px; }
      header .left{ gap:10px; }
      header h1{ font-size:14px; }
      header .tag{ display:none; } /* save space on phones */

      main{ padding:12px; gap:12px; }

      /* Stack form rows instead of 2-up (prevents "cut in half" inputs) */
      .row{ flex-direction:column; }
      .row > *{ flex:unset; }

      /* Battle Group header: keep Remove button visible and readable */
      .bghead{ flex-direction:column; align-items:stretch; }
      .bghead .right{ display:flex; justify-content:flex-end; }
      .bghead .right .tinybtn{ width:auto; white-space:nowrap; }

      /* Pick cards: allow actions to wrap nicely */
      .item{ flex-direction:column; }
      .item .btns{ justify-content:flex-start; }

      /* Bigger tap targets for touch */
      input, select, button, textarea{ font-size:16px; } /* avoids iOS zoom */
      .topbtn{ padding:10px 12px; border-radius:12px; }
      .tinybtn{ padding:10px 12px; border-radius:12px; }

      /* Roster textarea a bit shorter on phones */
      textarea{ height:340px; }
    }

    /* Safe-area support (iPhone notches) */
    @supports (padding: env(safe-area-inset-top)){
      header{
        padding-top: calc(12px + env(safe-area-inset-top));
        padding-left: calc(12px + env(safe-area-inset-left));
        padding-right: calc(12px + env(safe-area-inset-right));
      }
      main{
        padding-left: calc(12px + env(safe-area-inset-left));
        padding-right: calc(12px + env(safe-area-inset-right));
        padding-bottom: calc(12px + env(safe-area-inset-bottom));
      }
    }

</style>
</head>

<body>
<header>
  <div class="left">
    <h1>Halo: Ground Command — Force Builder</h1>
    <span class="tag">JSON save/load • PDF export</span>
  </div>
  <div class="right">
    <button class="topbtn" id="btnExportPdf">Export to PDF</button>
    <button class="topbtn" id="btnSaveJson">Download JSON</button>
    <label class="topbtn" style="margin:0;">
      Load JSON
      <input id="fileJson" type="file" accept="application/json" style="display:none;">
    </label>
  </div>
</header>

<main>
  <!-- LEFT -->
  <section class="card">
    <h2>Force Setup <span class="mini" id="autosaveNote"></span></h2>
    <div class="pad">
      <div class="row">
        <div>
          <label>Player Name</label>
          <input id="playerName" placeholder="e.g., Vince" />
        </div>
        <div>
          <label>Force Name</label>
          <input id="forceName" placeholder="e.g., Adepticon - 2026" />
        </div>
      </div>

      <div class="row">
        <div>
          <label>Faction</label>
          <select id="faction"></select>
        </div>
        <div>
          <label>Maximum Force Value (Points)</label>
          <!-- ✅ mobile keypad -->
          <input id="mfv" inputmode="numeric" type="number" min="0" step="10" value="1500"/>
        </div>
      </div>

      <label>Commander</label>
      <select id="commanderSelect"></select>
      <div class="mini" id="commanderInfo"></div>

      <div class="hr"></div>

      <!-- PDF EXPORT OPTIONS -->
      <div class="mini" style="font-weight:900; margin-bottom:6px;">PDF Export Options</div>

      <div class="row">
        <label class="pill" style="cursor:pointer; user-select:none;">
          <input type="checkbox" id="optShowUnitRules" style="width:auto; margin-right:8px;">
          Unit Rules column
        </label>

        <label class="pill" style="cursor:pointer; user-select:none;">
          <input type="checkbox" id="optShowRulesTable" style="width:auto; margin-right:8px;">
          Rules in this Force table
        </label>
      </div>

      <div class="row" style="margin-top:8px;">
        <label class="pill" style="cursor:pointer; user-select:none;">
          <input type="checkbox" id="optShowUnitStats" style="width:auto; margin-right:8px;">
          Unit stats (Move/React/Soak/Melee/DT)
        </label>

        <label class="pill" style="cursor:pointer; user-select:none;">
          <input type="checkbox" id="optShowWeaponStats" style="width:auto; margin-right:8px;">
          Weapon stats (Range/Arc/AP/AT/AA)
        </label>
      </div>

      <div class="hr"></div>

      <label>Add Battle Group</label>
      <div class="row">
        <select id="bgTypeSelect"></select>
        <button id="btnAddBg" class="accentbtn">Add</button>
      </div>

      <div class="hr"></div>

      <div class="chips" id="statusChips"></div>

      <div class="hr"></div>

      <div class="row">
        <button id="btnReset" class="ghostbtn">Reset Force</button>
      </div>
    </div>
  </section>

  <!-- RIGHT -->
  <section class="card">
    <h2>Battle Groups & Roster</h2>
    <div class="pad">
      <div class="bglist" id="bgList"></div>

      <div class="hr"></div>

      <label>Roster Output (copy/paste)</label>
      
      <div class="row" style="align-items:end; margin-bottom:8px;">
        <div class="mini" style="margin:0;">Tip: tap Copy to share/send your list.</div>
        <div style="flex:0 0 160px;">
          <button id="btnCopyRoster" class="topbtn" style="width:100%;">Copy Roster</button>
        </div>
      </div>
<textarea id="output" spellcheck="false"></textarea>
    </div>
  </section>
</main>

<!-- PRINT VIEW (used for PDF export) -->
<section class="printWrap" id="printWrap">
  <div class="printTitleBar">
    <h1 id="pTitle"></h1>
    <div class="sub" id="pSub"></div>
  </div>

  <div class="printBar" id="pPills"></div>

  <div class="printBox split" id="printRosterBox">
    <h2>Force Roster</h2>
    <table class="printTable" id="pRosterTable"></table>
  </div>

  <div class="printBox split" id="printRulesBox">
    <h2>Rules in this Force</h2>
    <table class="printTable" id="pRulesTable"></table>
  </div>
</section>

<script>

/* ===========================================================
   1) DATA (EDIT ME)
   Put FACTIONS / RULES_GLOSSARY / COMMANDERS / UNITS / BATTLEGROUPS here
   =========================================================== */
   
// const DB = { ... };
const DB = {
  FACTIONS: {
    UNSC:        { name:"UNSC",        accent:"#004878", accent2:"#3f627a" },
    Covenant:    { name:"Covenant",    accent:"#48308c", accent2:"#746b8d" },
    Banished:    { name:"Banished",    accent:"#71282d", accent2:"#796566" },
    Forerunners: { name:"Forerunners", accent:"#778998", accent2:"#979a9c" }
  },


RULES_GLOSSARY: {
  // =========================================================
  // CORE RULES (used by multiple factions / universal concepts)
  // Alphabetical by key
  // =========================================================
  "Active Overwatch": "Re-roll both dice for Reaction test (must accept second).",
  "Aerial Insertion": "May be deployed via a Combat Drop Air Support Mission (limits shown on the unit card).",
  "Armour-Piercing (X)": "Lower the number of successes in the target’s Soak dice pool by X.",
  "Armoured Infantry": "May occupy garrisonable terrain, benefit from terrain cover, and capture objectives as though Infantry.",
  "Attachment": [
    "One attached element per unit. Can’t attach to Flyers.",
    "Attached element contributes its React to the unit.",
    "When attached to Armoured, it loses its own weapons and uses vehicle weapons.",
    "If the vehicle is destroyed, the attached element is destroyed with no Heroic Saves.",
    "Attach by moving into contact (both gain Activation token unless already activated).",
    "Detach only in End Phase; placed within 4\"."
  ].join("\n"),
  "Battle Hardened": "Re-roll failed Melee Attack Dice up to X (X is shown on the unit card).",
  "Beam Weapon (X)": "Perform X separate Ranged Attacks with this weapon against a single nearest eligible element in the target unit. After resolving each attack, you may choose a new unit within 6\" of the previous target that is within Range and LOS. Reaction Fire from this weapon MUST target the unit reacted against.",
  "Blast": "Ignores cover penalties when determining Firepower Rating.",
  "Cloaking": "Elements in this unit cannot be the target of an Attack outside of Short Range. Units lose this loadout while claiming Objectives or occupying Garrison Terrain.",
  "Combat Specialists": "Unit may not have Characters attached unless otherwise stated.",
  "Commanding Presence": "+1 to friendly Reaction tests in range; Infantry in range reduce Suppression result by 1 (range shown on the unit card).",
  "Communications Specialist": "Once per Game Turn, increase the result of a Reaction Fire Test by +2 when within the Commanding Presence range.",
  "Cooldown": "May only fire once per turn; after firing, place a Cooldown token (clears End Phase).",
  "Deadly (X)": "Melee Attacks made by this unit may reduce the enemy Heroic Save value by -X (to a minimum of 6+).",
  "Death from Above": "Gains the Orbital Insertion loadout (per unit card).",
  "Devastating": "+1 Firepower Rating when targeting the specified Type.",
  "Diminutive": "Treated as an Infantry Element when determining Line of Sight only.",
  "Dust Off": "Leaves the table immediately after completing certain Air Support Missions.",
  "Elusive": "All enemy attacks count as firing into Cover that is one level higher (detail shown on the unit card).",
  "Evasive": "Add +X to Reaction Fire Tests targeting this unit (X shown on the unit card).",
  "Fearless": "Infantry can re-roll a failed Suppression test (must accept second).",
  "Firepower Rating": "Default 4. Cover + loadouts modify it. Rating changes exploding success handling.",
  "Flying Infantry": [
    "Unit is treated as a Flyer for the purpose of Terrain Rules.",
    "Cannot perform a Charge attack, or be the target of a Ram Attack.",
    "May be targeted by Shooting Attacks using AP or AA. Improve Heroic Save by +1 if AP is used (to a minimum of 6+).",
    "Ignored while this unit controls/contests an Objective, and while occupying Garrison terrain."
  ].join("\n"),
  "Heroic Save": "When allocated damage, roll the save to ignore the damage token (save type/target per unit).",
  "High Value Asset": "Does not score VP for BR destruction as normal; instead rewards VP per Damage Token applied (values shown on the unit card).",
  "High Value Target (X)": "Counts as BR reduced by X during force building; reverts to printed BR for VP calculation.",
  "Hijack": [
    "Move into contact; take 1 automatic damage (Heroic Saves allowed).",
    "If survives, vehicle becomes yours; cannot move immediately but can fire.",
    "In End Phase, hijacker may exit within 4\" or attempt to stay in control:",
    "  - Roll Halo die, need 3+ to retain; if fail, expelled within 4\" (opponent chooses) and takes 1 damage.",
    "If hijacked vehicle is destroyed, no VP awarded; hijacker is destroyed with the vehicle (no Heroic Saves)."
  ].join("\n"),
  "Hijack Resistant": "Cannot be hijacked; cannot accept attachments.",
  "Immobilize (X)": "If all Immobilize weapons target the same ARM/FLY unit, that unit must take a Suppression Test after damage; add +X when targeting ARM/FLY (X shown on the weapon).",
  "Indirect Fire": "Can shoot without LOS if another element in same Battle Group has unblocked LOS; resolves at FP2 with no modifiers.",
  "Inferno": "If all Inferno weapons target the same unit, it must take a Suppression Test; if failed, make a Repulse move away (add +2 if target is within a Terrain feature).",
  "Lethal": "Reduces the enemy Heroic Save value by -X (to a minimum of 6+).",
  "Limited Range": "All Long Range attacks are counted as firing into Cover that is 2 Levels higher when determining Firepower Rating.",
  "Lock On": "Gain +1 Firepower Rating when firing at Long Range.",
  "Move or Fire": "If element moved (not Hold), that weapon can’t fire and takes Cooldown.",
  "Orbital Insertion": "Deploy using Orbital Insertion rules (per your rulebook).",
  "Pinpoint": "Targets a selected element within range/LOS rather than the closest (detail shown on the unit card).",
  "Point Blank": "+1 Firepower Rating at Short Range.",
  "Reaction Fire": "Once per enemy activation, test at start or end of enemy move (2D6 vs React). Ready units that attempt gain Activation even if they fail.",
  "Stride": "This unit may move through Linear Obstacles, and is unaffected by Hindering Terrain.",
  "Sundering (Type)": "In Melee vs the specified Type, certain results count as Skulls (as shown on the unit card).",
  "Suppression": "If this attack causes damage, add +X to the enemy Suppression Test (use the highest +X present).",
  "Suppression Test": "Infantry only: after taking damage roll 2D6 + damage (+highest Suppression +X). On 12+ take Activation; if already activated, take Cooldown (no reactions).",
  "Transport (X)": "May Embark up to X Infantry Units. Up to 2 embarked Elements may add their weapons to Shooting Attacks made by this Unit.",

  // =========================================================
  // FACTION RULES — BANISHED
  // Alphabetical by key
  // =========================================================

function $(sel){ return document.querySelector(sel); }

function escapeHtml(s){
  return String(s ?? "").replace(/[&<>"']/g, m => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[m]));
}

function toast(msg){
  const el = document.createElement("div");
  el.textContent = msg;
  el.style.position="fixed";
  el.style.bottom="16px";
  el.style.right="16px";
  el.style.padding="10px 12px";
  el.style.border="1px solid rgba(255,255,255,.15)";
  el.style.background="rgba(10,16,30,.92)";
  el.style.borderRadius="12px";
  el.style.color="white";
  el.style.fontSize="12px";
  el.style.zIndex="9999";
  document.body.appendChild(el);
  setTimeout(()=>{ el.remove(); }, 1400);
}

/* ===========================================================
   4) THEME
   =========================================================== */

function hexToRgb(hex){
  const h = String(hex||"").replace("#","").trim();
  if(h.length===3){
    const r=parseInt(h[0]+h[0],16), g=parseInt(h[1]+h[1],16), b=parseInt(h[2]+h[2],16);
    return {r,g,b};
  }
  if(h.length===6){
    const r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
    return {r,g,b};
  }
  return {r:47,g:125,b:255};
}

function applyTheme(factionId){
  const f = DB.FACTIONS[factionId] || DB.FACTIONS.UNSC;
  const {r,g,b} = hexToRgb(f.accent);
  document.documentElement.style.setProperty("--accent", f.accent);
  document.documentElement.style.setProperty("--accent2", f.accent2);
  document.documentElement.style.setProperty("--accentLight", `rgba(${r},${g},${b},.12)`);
  document.documentElement.style.setProperty("--accentLighter", `rgba(${r},${g},${b},.08)`);
}

/* ===========================================================
   6) CORE MATH / COSTING / BUCKETS
   =========================================================== */

function typeList(u){
  const t = u?.type;
  if(Array.isArray(t)) return t.map(x => String(x).trim().toUpperCase()).filter(Boolean);
  return [String(t || "").trim().toUpperCase()].filter(Boolean);
}

function unitBuckets(u){
  // countsAs wins (accounting override)
  if(Array.isArray(u?.countsAs) && u.countsAs.length){
    return u.countsAs.map(x => String(x).trim().toUpperCase());
  }

  // default: counts as whatever types it has
  const ts = typeList(u);
  const out = new Set();

  for(const t of ts){
    if(t === "ASF" || t === "FLY") out.add("FLY");
    else if(t === "ARM") out.add("ARM");
    else if(t === "CHA") out.add("CHAR");
    else if(t === "INF") out.add("INF");
  }

  // fallback if someone forgets type
  if(out.size === 0) out.add("INF");

  return [...out];
}

function unitPrimaryBucket(unit){
  // single “primary” bucket for grouping/UI
  const ts = typeList(unit);
  if(ts.includes("CHA")) return "CHAR";
  if(ts.includes("ARM")) return "ARM";
  if(ts.includes("FLY") || ts.includes("ASF")) return "FLY";
  return "INF";
}

function pickElementCount(unit, pick){
  if(unit.elementsRule?.mode === "each") return Number(pick.countElements ?? unit.elementsRule.min);
  return 1;
}

function pickBR(unit, pick){
  return unit.br * pickElementCount(unit, pick);
}

/**
 * Points include only UNIT upgrades (paid)
 * BG special rules / bonuses are FREE and do not change points.
 */
function pickPoints(unit, pick){
  const n = pickElementCount(unit, pick);
  let base = unit.points * n;

  let ups = 0;
  for(const upPick of (pick.upgrades||[])){
    const def = (unit.upgrades||[]).find(u=>u.id===upPick.id);
    if(!def) continue;

    if(def.mode==="flat") ups += def.cost;

    if(def.mode==="choice"){
      const idx = Number(upPick.choiceIndex ?? 0);
      ups += Number(def.choices?.[idx]?.cost ?? 0);
    }

    // ✅ ADD THIS (counted upgrades: 0..max, cost each)
    if(def.mode==="count"){
      const c = Number(upPick.count || 0);
      ups += c * Number(def.costEach || 0);
    }
  }

  return base + ups;
}


/* ===========================================================
   7) BATTLEGROUP RESTRICTIONS + REQUIRED MIN ELEMENTS
   =========================================================== */

function forerunnerFamily(unitId){
  const id = String(unitId || "");
  if(id.includes("SENTINEL") || id === "FOR_SUB_MONITOR") return "SENTINEL";
  if(
    id.startsWith("FOR_CRAWLER") ||
    id.startsWith("FOR_SOLDIER") ||
    id.startsWith("FOR_KNIGHT") ||
    id.startsWith("FOR_WATCHERS") ||
    id === "FOR_WARDEN_ETERNAL"
  ) return "PROMETHEAN";
  return "OTHER";
}

function violatesBgRestrictions(bgTpl, unitId){
  const restrict = bgTpl?.restrict;
  if(!restrict) return false;

  const u = getUnit(unitId);
  if(!u) return false;

  if(bgTpl.faction === "Forerunners"){
    const fam = forerunnerFamily(unitId);
    if(restrict.noSentinel && fam === "SENTINEL") return true;
    if(restrict.noPromethean && fam === "PROMETHEAN") return true;
  }
  return false;
}

function isPickRequired(bg, pickId){
  return Object.values(bg.requiredFilled||{}).some(arr => (arr||[]).includes(pickId));
}

function findRequiredSlotIdForPick(bg, pickId){
  const rf = bg?.requiredFilled || {};
  for(const slotId of Object.keys(rf)){
    if((rf[slotId] || []).includes(pickId)) return slotId;
  }
  return null;
}

function requiredPickMeetsMinElements(bg, slotId, pickId){
  const tpl = getBGTemplate(bg.bgTemplateId);
  const req = (tpl?.required || []).find(r => r.slotId === slotId);
  const minReq = Number(req?.minElements || 0);
  if(!minReq) return true;

  const pick = bg.picks.find(p => p.pickId === pickId);
  if(!pick) return false;

  const u = getUnit(pick.unitId);
  if(!u) return false;

  if(u.elementsRule?.mode !== "each") return true;
  const n = pickElementCount(u, pick);
  return n >= minReq;
}


/* ===========================================================
   8) BATTLEGROUP SPECIAL RULES (display + “requisite commander” effects)
   =========================================================== */

function bgSpecialRulesText(tpl){
  if(!tpl) return "";
  const sr = tpl.specialRules;
  if(!sr) return "";

  let lines = [];
  if(Array.isArray(sr)) lines = sr.slice();
  else lines = String(sr).split("\n");

  lines = lines.map(s => String(s || "").trim()).filter(Boolean);
  if(lines.length === 0) return "";

  const isNA = (s) => /^n\/a$/i.test(s) || /^na$/i.test(s) || /^none$/i.test(s);
  const realLines = lines.filter(l => !isNA(l));
  const finalLines = realLines.length ? realLines : lines;

  return finalLines.join("\n");
}

function parseBgEffectsFromText(tpl){
  const text = bgSpecialRulesText(tpl);
  if(!text) return { applyToSlotId: null, reactBonus: 0, addTags: [] };

  const reactBonus = /gains\s*\+\s*1\s*to\s*its\s*react/i.test(text) ? 1 : 0;

  const addTags = [];
  if(/commanding\s+presence\s*\(\s*8/i.test(text)) addTags.push('Commanding Presence (8”)');
  if(/intimidating\s+presence\s*\(\s*8/i.test(text)) addTags.push('Intimidating Presence (8”)');

  const candidates = (tpl.required || []).map(r => r.slotId || "").filter(Boolean);

  const preferred =
      candidates.find(id => /REQ_TANK|REQ_WRAITH|REQ_HEAVY/i.test(id))
   || candidates.find(id => /REQ_ERADICATOR/i.test(id))
   || null;

  return { applyToSlotId: preferred, reactBonus, addTags };
}

function applyBgBonusesToPick(bg, pick, requiredSlotId){
  const tpl = getBGTemplate(bg.bgTemplateId);
  if(!tpl) return;

  const eff = parseBgEffectsFromText(tpl);
  if(!eff.applyToSlotId) return;
  if(requiredSlotId !== eff.applyToSlotId) return;

  pick.bgBonus ||= { reactBonus: 0, addTags: [] };

  if(eff.reactBonus){
    pick.bgBonus.reactBonus = (pick.bgBonus.reactBonus || 0) + eff.reactBonus;
  }
  for(const t of (eff.addTags || [])){
    if(!pick.bgBonus.addTags.includes(t)) pick.bgBonus.addTags.push(t);
  }
}

function effectiveReact(unit, pick){
  const base = String(unit?.react ?? "—");
  const bonus = Number(pick?.bgBonus?.reactBonus || 0);
  if(!bonus) return base;

  const m = String(base).match(/^\s*(\d+)\s*\/\s*(\d+)\s*$/);
  if(m){
    const a = Number(m[1]) + bonus;
    const b = Number(m[2]) + bonus;
    return `${a}/${b}`;
  }
  return `${base} (+${bonus})`;
}

function effectiveTags(unit, pick){
  const set = new Set();
  (unit.tags || []).forEach(t => set.add(t));
  (pick?.bgBonus?.addTags || []).forEach(t => set.add(t));
  return [...set].filter(Boolean);
}


/* ===========================================================
   9) TOTALS + VALIDATION
   =========================================================== */

function bgTotals(bg){
  const tpl = getBGTemplate(bg.bgTemplateId);
  let pts=0, br=0;

  let optInfBR=0, optArmBR=0, optFlyBR=0, optChar=0;

  for(const p of bg.picks){
    const u = getUnit(p.unitId);
    if(!u) continue;

    const pPts = pickPoints(u,p);
    const pBR  = pickBR(u,p);
    pts += pPts; br += pBR;

    const required = isPickRequired(bg, p.pickId);
    if(!required){
		const buckets = unitBuckets(u);

		if(buckets.includes("INF"))  optInfBR += pBR;
		if(buckets.includes("ARM"))  optArmBR += pBR;
		if(buckets.includes("FLY"))  optFlyBR += pBR;
		if(buckets.includes("CHAR")) optChar  += 1;
    }
  }
  return { pts, br, optInfBR, optArmBR, optFlyBR, optChar, caps: tpl?.caps };
}

function forceTotals(){
  const cmd = getCommander(state.commanderId);
  let pts = cmd?.points ?? 0;
  let br  = 0;
  for(const bg of state.battleGroups){
    const t = bgTotals(bg);
    pts += t.pts; br += t.br;
  }
  return { pts, br };
}

function validateBG(bg){
  const tpl = getBGTemplate(bg.bgTemplateId);
  const t = bgTotals(bg);

  const missing = [];
  const extraIssues = [];

  for(const req of (tpl?.required||[])){
    const filledPickIds = (bg.requiredFilled?.[req.slotId] || []);
    const filled = filledPickIds.length;
    if(filled < req.qty) missing.push(`${req.label} (${filled}/${req.qty})`);

    const minReq = Number(req.minElements || 0);
    if(minReq){
      for(const pid of filledPickIds){
        const p = bg.picks.find(x => x.pickId === pid);
        if(!p) continue;
        const u = getUnit(p.unitId);
        if(!u) continue;
        if(u.elementsRule?.mode === "each"){
          const actual = pickElementCount(u, p);
          if(actual < minReq){
            extraIssues.push(`${req.label}: requires at least ${minReq} elements (currently ${actual}).`);
          }
        }
      }
    }
  }

  const capIssues = [];
  if(t.caps){
    if(t.optInfBR > t.caps.optionalInfBR) capIssues.push(`Optional INF BR ${t.optInfBR}/${t.caps.optionalInfBR}`);
    if(t.optArmBR > t.caps.optionalArmBR) capIssues.push(`Optional ARM BR ${t.optArmBR}/${t.caps.optionalArmBR}`);
    if(t.optFlyBR > t.caps.optionalFlyBR) capIssues.push(`Optional FLY BR ${t.optFlyBR}/${t.caps.optionalFlyBR}`);
    if(t.optChar  > t.caps.optionalCharCount) capIssues.push(`Optional CHAR ${t.optChar}/${t.caps.optionalCharCount}`);
  }

  if(tpl?.restrict && tpl.faction === "Forerunners"){
    for(const p of (bg.picks || [])){
      if(violatesBgRestrictions(tpl, p.unitId)){
        const fam = forerunnerFamily(p.unitId);
        extraIssues.push(`Restricted unit present: ${p.unitId} (${fam}).`);
      }
    }
  }

  return { missing, capIssues, extraIssues };
}

function canAddPickToBG(bg, unitId, requiredSlotId = null){
  const tpl = getBGTemplate(bg.bgTemplateId);
  const u = getUnit(unitId);
  if(!tpl || !u) return { ok:false, reason:"Unknown unit or battlegroup." };

  // ✅ Enforce BG restrictions for BOTH required and optional adds
  if(violatesBgRestrictions(tpl, unitId)){
    const fam = forerunnerFamily(unitId);
    if(tpl?.restrict?.noSentinel && fam === "SENTINEL")   return { ok:false, reason:"This Battle Group cannot include Sentinel units." };
    if(tpl?.restrict?.noPromethean && fam === "PROMETHEAN") return { ok:false, reason:"This Battle Group cannot include Promethean units." };
    return { ok:false, reason:"This unit is restricted in this Battle Group." };
  }

  // ✅ Required slots: only validate slot capacity + allow-list is already handled by UI list
  if(requiredSlotId){
    const reqDef = (tpl.required || []).find(r => r.slotId === requiredSlotId);
    if(reqDef){
      const filled = (bg.requiredFilled?.[requiredSlotId] || []).length;
      if(filled >= reqDef.qty) return { ok:false, reason:"That required slot is already full." };
    }
    return { ok:true };
  }

  // ✅ Optional caps validation
  const t = bgTotals(bg);
  const caps = t.caps || {};

  // BR to “reserve” when adding this unit as optional.
  // For "each" units, assume minimum elements (same logic you had).
  const assumedBR = u.br * (u.elementsRule?.mode === "each" ? (u.elementsRule.min ?? 1) : 1);

  // ✅ unitBuckets(u) returns an array like ["ARM","CHA"] or ["INF"], etc.
  const buckets = unitBuckets(u);

  // CHAR cap is per-unit (not BR) and can stack with other buckets
  if(buckets.includes("CHAR")){
    const nextChar = t.optChar + 1;
    if(Number.isFinite(caps.optionalCharCount) && nextChar > caps.optionalCharCount){
      return { ok:false, reason:`Optional CHAR cap reached (${t.optChar}/${caps.optionalCharCount}).` };
    }
  }

  // BR caps can stack if the unit counts as multiple categories
  if(buckets.includes("INF")){
    const next = t.optInfBR + assumedBR;
    if(Number.isFinite(caps.optionalInfBR) && next > caps.optionalInfBR){
      return { ok:false, reason:`Optional INF BR cap exceeded (${t.optInfBR}+${assumedBR} > ${caps.optionalInfBR}).` };
    }
  }

  if(buckets.includes("ARM")){
    const next = t.optArmBR + assumedBR;
    if(Number.isFinite(caps.optionalArmBR) && next > caps.optionalArmBR){
      return { ok:false, reason:`Optional ARM BR cap exceeded (${t.optArmBR}+${assumedBR} > ${caps.optionalArmBR}).` };
    }
  }

  if(buckets.includes("FLY")){
    const next = t.optFlyBR + assumedBR;
    if(Number.isFinite(caps.optionalFlyBR) && next > caps.optionalFlyBR){
      return { ok:false, reason:`Optional FLY BR cap exceeded (${t.optFlyBR}+${assumedBR} > ${caps.optionalFlyBR}).` };
    }
  }

  return { ok:true };
}

   10) RULE NORMALIZATION + REMINDERS

function normalizeRuleName(rule){
  if (!rule) return rule;

  let r = String(rule)
    .replace(/[“”]/g, '"')
    .replace(/[’]/g, "'")
    .trim();

  if (r.startsWith("Devastating")) return "Devastating";
  if (r.startsWith("Cooldown")) return "Cooldown";
  if (r.startsWith("Attachment")) return "Attachment";
  if (r.startsWith("Commanding Presence")) return "Commanding Presence";
  if (r.startsWith("Battle Hardened")) return "Battle Hardened";
  if (r.startsWith("Heroic Save")) return "Heroic Save";
  if (r.startsWith("Elusive")) return "Elusive";
  if (r.startsWith("Evasive")) return "Evasive";
  if (r.startsWith("Suppression(") || r.startsWith("Suppression (")) return "Suppression";
  if (r.startsWith("Lock On")) return "Lock On";
  if (r.startsWith("Pinpoint")) return "Pinpoint";
  if (r.startsWith("Lethal")) return "Lethal";
  if (r.startsWith("Inferno")) return "Inferno";
  

  if (r.startsWith("Armour-Piercing")) return "Armour-Piercing (X)";
  if (r.startsWith("Immobilize")) return "Immobilize (X)";
  if (r.startsWith("Deadly")) return "Deadly (X)";
  if (r.startsWith("Sundering")) return "Sundering (Type)";
  if (r.startsWith("Devastating Impact")) return "Devastating Impact (X)";

  if (r.startsWith("Transport")) return "Transport (X)";
  if (r.startsWith("High Value Target")) return "High Value Target (X)";
  if (r.startsWith("High Value Asset")) return "High Value Asset";
  if (r.startsWith("Momentum")) return "Momentum (X”)";
  if (r.startsWith("Intimidating Presence")) return "Intimidating Presence";

  if (r === "Sour the Skies") return "Scour the Skies";
  if (r === "Scour the Skies") return "Scour the Skies";
  
  // normalizeRuleName(rule) additions:
  if (r.startsWith("Beam Weapon")) return "Beam Weapon (X)";

  return r;
}

function normalizedDisplayName(rule){
  const k = normalizeRuleName(rule);

  const map = {
    "Cooldown": "Cooldown",
    "Devastating": "Devastating",
    "Attachment": "Attachment",
    "Commanding Presence": "Commanding Presence",
    "Battle Hardened": "Battle Hardened",
    "Heroic Save": "Heroic Save",
    "Elusive": "Elusive",
    "Evasive": "Evasive",
    "Suppression": "Suppression",
    "Lock On": "Lock On",
    "Pinpoint": "Pinpoint",
    "Lethal": "Lethal",
    "Inferno": "Inferno",

    "Armour-Piercing (X)": "Armour-Piercing",
    "Immobilize (X)": "Immobilize",

	// normalizedDisplayName(rule) map additions:
    "Beam Weapon (X)": "Beam Weapon",
	
  };

  return map[k] || k;
}

/**
 * UPDATED: also collects BG special rules AND BG-applied bonus tags.
 */
function collectArmyRefs(){
  const cmd = getCommander(state.commanderId);
  const ruleMap = new Map();

  if(cmd){
    ruleMap.set(`__OD__${cmd.orderDice}`, `Order Dice: ${cmd.orderDice}`);
    (cmd.standardOrders||[]).forEach(o => ruleMap.set(`__ORDER__${o}`, `Order: ${o}`));
    if(cmd.uniqueAbility) ruleMap.set(`__CMD__${cmd.uniqueAbility}`, `Commander Ability: ${cmd.uniqueAbility}`);
  }

  // BG special rules are informational; we include their “keywords” by extracting known tags
  for(const bg of state.battleGroups){
    const tpl = getBGTemplate(bg.bgTemplateId);
    const sr = bgSpecialRulesText(tpl);

    if(/commanding\s+presence/i.test(sr)){
      const k = normalizeRuleName("Commanding Presence");
      if(!ruleMap.has(k)) ruleMap.set(k, "Commanding Presence");
    }
    if(/intimidating\s+presence/i.test(sr)){
      const k = normalizeRuleName("Intimidating Presence");
      if(!ruleMap.has(k)) ruleMap.set(k, "Intimidating Presence");
    }
  }

  for(const bg of state.battleGroups){
    for(const p of bg.picks){
      const u = getUnit(p.unitId);
      if(!u) continue;

      // Effective tags include BG bonuses
      const tags = effectiveTags(u, p);
      for(const tag of tags){
        const k = normalizeRuleName(tag);
        if(!ruleMap.has(k)) ruleMap.set(k, tag);
      }

      for(const w of (u.weapons||[])){
        for(const l of (w.loadouts||[])){
          const k = normalizeRuleName(l);
          if(!ruleMap.has(k)) ruleMap.set(k, l);
        }
      }

		// upgradeWeapons (only selected)
		const up = u.upgradeWeapons || {};
		for(const upPick of (p?.upgrades || [])){
		  const upId = upPick.id;
		  let arr = up[upId] || [];

		  // choice upgrades can store weapons per selected choice index
		  if(!Array.isArray(arr) && arr && typeof arr === "object"){
			const idx = Number(upPick.choiceIndex ?? 0);
			arr = arr[idx] || [];
		  }

		  for(const ww of arr){
			for(const l of (ww.loadouts || [])){
			  const k = normalizeRuleName(l);
			  if(!ruleMap.has(k)) ruleMap.set(k, l);
			}
		  }
		}
    }
  }

  const rules = [...ruleMap.values()];
  rules.sort((a,b)=>a.localeCompare(b));
  return { rules };
}

function ruleReminder(rule){
  const cmd = getCommander(state.commanderId);

  if(rule.startsWith("Order Dice: ")){
    const n = rule.split(":")[1]?.trim() || "";
    return `Roll ${n} Order Dice each Pre-Turn. You may keep unspent dice between turns; spend per order costs.`;
  }
  if(rule.startsWith("Order: ")){
    const name = rule.replace("Order: ","").trim();
    if(cmd?.orderSummaries?.[name]) return cmd.orderSummaries[name];
    return "Commander order (add summary in DB.COMMANDERS[FACTION].orderSummaries).";
  }
  if(rule.startsWith("Commander Ability: ")){
    const name = rule.replace("Commander Ability: ","").trim();
    if(cmd?.uniqueAbility === name && cmd?.abilitySummary) return cmd.abilitySummary;
    return "Commander unique ability (add summary in DB.COMMANDERS[FACTION].abilitySummary).";
  }

  const key = normalizeRuleName(rule);

  if(DB.RULES_GLOSSARY[key]) return DB.RULES_GLOSSARY[key];
  if(DB.RULES_GLOSSARY[rule]) return DB.RULES_GLOSSARY[rule];

  if(key === "Intimidating Presence"){
    return "Enemy units in range suffer penalties/constraints as defined on the unit card or scenario (add a glossary entry if you want a custom reminder).";
  }

  return "Rule present in this force (add a glossary entry to show a reminder).";
}


/* ===========================================================
   11) ROSTER HELPERS
   =========================================================== */

function displayElementsCount(unit, pick){
  if(unit.elementsRule?.mode === "each") return pickElementCount(unit, pick);
  if(unit.elementsRule?.mode === "fixed") return unit.elementsRule.min;
  return 1;
}

function displayUpgrades(unit, pick){
  const ups = [];

  for(const upPick of (pick.upgrades || [])){
    const def = (unit.upgrades || []).find(u => u.id === upPick.id);
    if(!def) continue;

    if(def.mode === "flat"){
      ups.push(def.label);
    }else if(def.mode === "choice"){
      const idx = Number(upPick.choiceIndex ?? 0);
      const choice = def.choices?.[idx];
      ups.push(choice?.label ? `${def.label}: ${choice.label}` : def.label);
    }else if(def.mode === "count"){
      const c = Number(upPick.count || 0);
      if(c > 0){
        const each = Number(def.costEach || 0);
        ups.push(`${def.label} x${c}${each ? ` (+${each} each)` : ""}`);
      }
    }
  }

  if(pick?.bgBonus?.reactBonus){
    ups.push(`Battle Group Bonus: +${pick.bgBonus.reactBonus} React (free)`);
  }
  for(const t of (pick?.bgBonus?.addTags || [])){
    ups.push(`Battle Group Bonus: ${t} (free)`);
  }

  return ups.join("; ");
}

function formatTypeShort(unit){
  const ts = typeList(unit);

  const pretty = ts.map(t => {
    if(t === "CHA") return "CHAR";
    if(t === "ASF") return "FLY (Air)";
    return t;
  });

  // If ASF is present, you probably don’t also need FLY in the display
  const unique = [...new Set(pretty)];

  return unique.join(" / ");
}

function pickUnitRulesForColumn(unit, pick){
  const set = new Set();
  effectiveTags(unit, pick).forEach(t => set.add(t));
  for(const w of (unit.weapons || [])) (w.loadouts || []).forEach(l => set.add(l));
  return [...set].filter(Boolean).join(", ");
}

function capLineHtml(t){

/** Upgrade UI helpers (MUST exist before renderBGList uses them) */
function isUpgradeSelected(pick, upId){
  const entry = (pick.upgrades || []).find(x => x.id === upId);
  if(!entry) return false;
  // count upgrades are “selected” only if count > 0
  if(Number.isFinite(entry.count)) return Number(entry.count) > 0;
  return true; // flat/choice (existing behavior)
}

function getPickCurrentElements(unit, pick){
  if(unit?.elementsRule?.mode === "each"){
    return Number(pick?.countElements ?? unit.elementsRule?.min ?? 1);
  }
  return Number(unit?.elementsRule?.min ?? 1);
}

function getUpgradeDef(unit, upId){
  return (unit?.upgrades || []).find(u => u.id === upId) || null;
}

function getSiblingCountInGroup(unit, pick, def){
  if(!def?.reqGroup) return 0;

  let total = 0;
  for(const entry of (pick?.upgrades || [])){
    if(entry.id === def.id) continue;

    const otherDef = getUpgradeDef(unit, entry.id);
    if(!otherDef) continue;
    if(otherDef.reqGroup !== def.reqGroup) continue;

    total += Number(entry.count || 0);
  }
  return total;
}

function getMaxAllowedUpgradeCount(unit, pick, def){
  const elementCap = getPickCurrentElements(unit, pick);
  const ruleCap = Number(def?.max ?? elementCap);

  // If this count upgrade shares a group with other counted upgrades,
  // only allow the remaining free elements in that group.
  if(def?.reqGroup){
    const siblingsUsed = getSiblingCountInGroup(unit, pick, def);
    return Math.max(0, Math.min(ruleCap, elementCap - siblingsUsed));
  }

  return Math.max(0, Math.min(ruleCap, elementCap));
}

function setUpgradeCount(bgId, pickId, upId, count){
  const bg = state.battleGroups.find(b => b.bgId === bgId);
  const pick = bg?.picks?.find(p => p.pickId === pickId);
  const unit = pick ? getUnit(pick.unitId) : null;
  if(!bg || !pick || !unit) return;

  const def = (unit.upgrades || []).find(u => u.id === upId);
  if(!def || def.mode !== "count") return;

  const maxAllowed = getMaxAllowedUpgradeCount(unit, pick, def);
  let c = Math.max(0, Math.min(maxAllowed, Number(count || 0)));

  // If this upgrade is in a mutex group and we’re setting it > 0,
  // zero out other counted upgrades in that group first.
  if(def.mutex && def.reqGroup && c > 0){
    pick.upgrades = (pick.upgrades || []).map(x => {
      if(x.id === upId) return x;
      const other = (unit.upgrades || []).find(u => u.id === x.id);
      if(other && other.reqGroup === def.reqGroup && other.mode === "count"){
        return { ...x, count: 0 };
      }
      return x;
    });
  }

  let entry = (pick.upgrades || []).find(x => x.id === upId);
  if(!entry){
    entry = { id: upId, count: 0 };
    pick.upgrades.push(entry);
  }

  entry.count = c;

  if(entry.count === 0){
    pick.upgrades = (pick.upgrades || []).filter(x => x.id !== upId);
  }

  render();
}

function toggleUpgrade(bgId, pickId, upId, enabled){
  const bg = state.battleGroups.find(b => b.bgId === bgId);
  const pick = bg?.picks?.find(p => p.pickId === pickId);
  const unit = pick ? getUnit(pick.unitId) : null;
  if(!bg || !pick || !unit) return;

  const def = (unit.upgrades || []).find(u => u.id === upId);
  if(!def) return;

  if(enabled){
    // ✅ If this upgrade belongs to a mutex group, unselect other upgrades in that same group
    const grp = def.reqGroup;
    if(def.mutex && grp){
      pick.upgrades = (pick.upgrades || []).filter(x => {
        const other = (unit.upgrades || []).find(u => u.id === x.id);
        return !(other && other.reqGroup === grp && other.id !== upId);
      });
    }

    if(!isUpgradeSelected(pick, upId)){
      if(def.mode === "choice") pick.upgrades.push({ id: upId, choiceIndex: 0 });
      else pick.upgrades.push({ id: upId });
    }
  }else{
    pick.upgrades = (pick.upgrades || []).filter(x => x.id !== upId);
  }

  render();
}

function setUpgradeChoice(bgId, pickId, upId, choiceIndex){
  const bg = state.battleGroups.find(b => b.bgId === bgId);
  const pick = bg?.picks?.find(p => p.pickId === pickId);
  const unit = pick ? getUnit(pick.unitId) : null;
  if(!bg || !pick || !unit) return;

  const def = (unit.upgrades || []).find(u => u.id === upId);
  if(!def || def.mode !== "choice") return;

  let entry = (pick.upgrades || []).find(x => x.id === upId);
  if(!entry){
    entry = { id: upId, choiceIndex: 0 };
    pick.upgrades.push(entry);
  }
  entry.choiceIndex = Number(choiceIndex || 0);
  render();
}

/** Stats / weapons text */
function unitStatsText(u, pick){
  const mv = u.move ?? "—";
  const rc = effectiveReact(u, pick);
  const sk = (u.soak ?? "—");
  const ml = (u.melee ?? u.impact ?? "—");
  const dt = u.damageTrack ?? "—";
  return `M ${mv} • R ${rc} • S ${sk} • Me ${ml} • DT ${dt}`;
}

function weaponsText(u, pick, includeStats){
  const lines = [];

  // base weapons always
  for(const w of (u.weapons || [])){
    if(!includeStats){
      lines.push(w.name);
    }else{
      lines.push(`${w.name} — ${w.range||"—"} • ${w.arcs||"—"} • AP ${w.ap??"—"} • AT ${w.at??"—"} • AA ${w.aa??"—"}`);
    }
  }

  // upgrade weapons ONLY if upgrade is selected
  const up = u.upgradeWeapons || {};

  for(const upPick of (pick?.upgrades || [])){
    const upId = upPick.id;
    let arr = up[upId] || [];

    // choice upgrades can store weapons per selected choice index
    if(!Array.isArray(arr) && arr && typeof arr === "object"){
      const idx = Number(upPick.choiceIndex ?? 0);
      arr = arr[idx] || [];
    }

    for(const w of arr){
      if(!includeStats){
        lines.push(w.name);
      }else{
        lines.push(`${w.name} — ${w.range||"—"} • ${w.arcs||"—"} • AP ${w.ap??"—"} • AT ${w.at??"—"} • AA ${w.aa??"—"}`);
      }
    }
  }

  return lines.length ? lines.join("\n") : "—";
}

function addBattleGroup(bgTemplateId){

}

function removeBattleGroup(bgId){
  state.battleGroups = state.battleGroups.filter(b => b.bgId !== bgId);
  render();
}

function addPickToBG(bgId, unitId, requiredSlotId=null){
  const bg = state.battleGroups.find(b=>b.bgId===bgId);
  const unit = getUnit(unitId);
  if(!bg || !unit) return;

  const pick = {
    pickId: uid(),
    unitId,
    upgrades: [],
    bgBonus: { reactBonus: 0, addTags: [] } // ensure exists for save/load stability
  };

  if(unit.elementsRule?.mode === "each"){
    pick.countElements = unit.elementsRule.min;
  }

  // ✅ If placed into a required slot with minElements, enforce it immediately
  if(requiredSlotId && unit.elementsRule?.mode === "each"){
    const tpl = getBGTemplate(bg.bgTemplateId);
    const req = (tpl?.required || []).find(r => r.slotId === requiredSlotId);
    const minReq = Number(req?.minElements || 0);
    if(minReq){
      pick.countElements = Math.max(pick.countElements ?? unit.elementsRule.min, minReq);
    }
  }

  // ✅ Auto-select "required one-of" groups (pick the first option only)
  const ups = (unit.upgrades || []);
  const oneOfGroups = new Map(); // groupId -> [upgradeDefs]
  for(const up of ups){
    if(up.reqOneOf && up.reqGroup){
      if(!oneOfGroups.has(up.reqGroup)) oneOfGroups.set(up.reqGroup, []);
      oneOfGroups.get(up.reqGroup).push(up);
    }
  }

  for(const [gid, defs] of oneOfGroups.entries()){
    const first = defs[0];
    if(first){
      if(first.mode === "choice") pick.upgrades.push({ id: first.id, choiceIndex: 0 });
      else pick.upgrades.push({ id: first.id });
    }
  }

  // ✅ Keep your old heuristic for other upgrades that still literally say "required"
  for(const up of ups){
    if(up.reqOneOf) continue; // already handled above
    const isReq = (typeof up.label === "string") && /required/i.test(up.label);
    if(!isReq) continue;
    if(up.mode === "choice") pick.upgrades.push({ id: up.id, choiceIndex: 0 });
    else pick.upgrades.push({ id: up.id });
  }

  // ✅ Apply battlegroup “requisite commander” bonuses if applicable
  if(requiredSlotId){
    applyBgBonusesToPick(bg, pick, requiredSlotId);
  }

  bg.picks.push(pick);

  if(requiredSlotId){
    if(!bg.requiredFilled) bg.requiredFilled = {};
    if(!bg.requiredFilled[requiredSlotId]) bg.requiredFilled[requiredSlotId] = [];
    bg.requiredFilled[requiredSlotId].push(pick.pickId);
  }

  render();
}

function removePick(bgId, pickId){
  const bg = state.battleGroups.find(b=>b.bgId===bgId);
  if(!bg) return;

  bg.picks = bg.picks.filter(p=>p.pickId!==pickId);

  if(bg.requiredFilled){
    for(const k of Object.keys(bg.requiredFilled)){
      bg.requiredFilled[k] = (bg.requiredFilled[k]||[]).filter(id => id !== pickId);
    }
  }
  render();
}

function setPickElements(bgId, pickId, n){
  const bg = state.battleGroups.find(b=>b.bgId===bgId);
  const pick = bg?.picks?.find(p=>p.pickId===pickId);
  const unit = pick ? getUnit(pick.unitId) : null;
  if(!bg || !pick || !unit) return;

  const baseMin = unit.elementsRule?.min ?? 1;
  const baseMax = unit.elementsRule?.max ?? baseMin;

  // If this pick is filling a required slot with a minElements rule, enforce it
  let requiredMin = 0;
  const slotId = findRequiredSlotIdForPick(bg, pickId);
  if(slotId){
    const tpl = getBGTemplate(bg.bgTemplateId);
    const req = (tpl?.required || []).find(r => r.slotId === slotId);
    requiredMin = Number(req?.minElements || 0);
  }

  const min = Math.max(baseMin, requiredMin || 0);
  const max = baseMax;

  const num = Math.max(min, Math.min(max, Number(n || min)));
  pick.countElements = num;

  // Clamp count-upgrades to the new actual element count
  for(const entry of [...(pick.upgrades || [])]){
    const def = getUpgradeDef(unit, entry.id);
    if(!def || def.mode !== "count") continue;

    const maxAllowed = getMaxAllowedUpgradeCount(unit, pick, def);
    const current = Number(entry.count || 0);

    if(current > maxAllowed){
      entry.count = maxAllowed;
    }
  }

  // Remove count-upgrade entries that dropped to 0 after clamping
  pick.upgrades = (pick.upgrades || []).filter(x => {
    const def = getUpgradeDef(unit, x.id);
    if(def?.mode === "count") return Number(x.count || 0) > 0;
    return true;
  });

  render();
}

			${upDefs.map(def=>{
            const checked = isUpgradeSelected(p, def.id);
            const isReq = (typeof def.label === "string") && /required/i.test(def.label);
			if(def.mode === "count"){
			  const entry = (p.upgrades || []).find(x => x.id === def.id);
			  const c = Number(entry?.count || 0);
			  const max = getMaxAllowedUpgradeCount(u, p, def);
			  const costEach = Number(def.costEach || 0);

			  return `
				<div class="uprow">
				  <div style="flex:1;">
					<span><b>${escapeHtml(def.label)}</b> <span class="uphint">(+${costEach} pts each)</span></span>
				  </div>
				  <div style="flex:0 0 120px;">
					<select
					  data-act="upCount"
					  data-bg="${bg.bgId}"
					  data-pick="${p.pickId}"
					  data-up="${def.id}">
					  ${Array.from({length:max+1}, (_,i)=>`<option value="${i}" ${i===c?"selected":""}>${i}</option>`).join("")}
					</select>
				  </div>
				</div>
			  `;
			}
            if(def.mode === "choice"){
              const entry = (p.upgrades || []).find(x => x.id === def.id);
              const idx = Number(entry?.choiceIndex ?? 0);

              return `
                <div class="uprow">
                  <div style="flex:1;">
                    <label>
                      <input type="checkbox"
                        data-act="togUp"
                        data-bg="${bg.bgId}"
                        data-pick="${p.pickId}"
                        data-up="${def.id}"
                        ${checked ? "checked" : ""} />
                      <span><b>${escapeHtml(def.label)}</b>${isReq ? ` <span class="chip" style="margin-left:6px;">Required</span>` : ""}</span>
                    </label>
                  </div>
                  <div style="flex:1;">
                    <select
                      data-act="upChoice"
                      data-bg="${bg.bgId}"
                      data-pick="${p.pickId}"
                      data-up="${def.id}"
                      ${checked ? "" : "disabled"}>
                      ${(def.choices || []).map((c,i)=>{
                        return `<option value="${i}" ${i===idx ? "selected" : ""}>${escapeHtml(c.label)} (+${Number(c.cost||0)} pts)</option>`;
                      }).join("")}
                    </select>
                  </div>
                </div>
              `;
            }

            const costTxt = `(+${Number(def.cost||0)} pts)`;
            return `
              <div class="uprow">
                <label style="flex:1;">
                  <input type="checkbox"
                    data-act="togUp"
                    data-bg="${bg.bgId}"
                    data-pick="${p.pickId}"
                    data-up="${def.id}"
                    ${checked ? "checked" : ""} />
                  <span><b>${escapeHtml(def.label)}</b> <span class="uphint">${escapeHtml(costTxt)}</span>${isReq ? ` <span class="chip" style="margin-left:6px;">Required</span>` : ""}</span>
                </label>
              </div>
            `;
          }).join("")}
        </div>
      ` : "";

      return `
        <div class="item">
          <div class="meta">
            <div class="t">${escapeHtml(u.name)}</div>
            <div class="s">${badge} <span class="chip">${escapeHtml(formatTypeShort(u))}</span> <span class="chip">BR ${br}</span> <span class="chip">${pts} pts</span></div>
            <div class="s">${escapeHtml(weaponsText(u, p, false) || "—")}${ups ? ` • ${escapeHtml(ups)}` : ""}</div>
            ${eachCtrl}
            ${upgradesUi}
          </div>
          <div class="btns">
            <button class="tinybtn ghostbtn" data-act="rmPick" data-bg="${bg.bgId}" data-pick="${p.pickId}">Remove</button>
          </div>
        </div>
      `;
    };

    if(reqPicks.length){
      reqZone.innerHTML += `<div class="hr"></div>` + reqPicks.map(p=>renderPickCard(p,true)).join("");
    }

    optZone.innerHTML = optPicks.length
      ? optPicks.map(p=>renderPickCard(p,false)).join("")
      : `<div class="mini" style="margin-top:10px;">No optional units yet.</div>`;

    // Delegated handlers
    el.addEventListener("click", (ev)=>{
      const btn = ev.target.closest("button[data-act]");
      if(!btn) return;
      const act = btn.dataset.act;

      if(act==="rmBg") removeBattleGroup(btn.dataset.bg);

      if(act==="addReq"){
        const bgId = btn.dataset.bg;
        const slotId = btn.dataset.slot;
        const sel = el.querySelector(`select[data-reqSel="${bgId}::${slotId}"]`);
        const unitId = sel?.value;

        const bgObj = state.battleGroups.find(b => b.bgId === bgId);
        const check = canAddPickToBG(bgObj, unitId, slotId);
        if(!check.ok){ toast(check.reason || "Cannot add required unit."); return; }

        addPickToBG(bgId, unitId, slotId);
      }

      if(act==="addOpt"){
        const bgId = btn.dataset.bg;
        const sel = el.querySelector(`select[data-optSel="${bgId}"]`);
        const unitId = sel?.value;

        if(unitId) uiState.optSelectedUnitByBgId[bgId] = unitId;

        const bgObj = state.battleGroups.find(b => b.bgId === bgId);
        const check = canAddPickToBG(bgObj, unitId, null);
        if(!check.ok){ toast(check.reason || "Cannot add unit: cap exceeded."); return; }

        addPickToBG(bgId, unitId, null);
      }

      if(act==="rmPick") removePick(btn.dataset.bg, btn.dataset.pick);
    });

    el.addEventListener("input", (ev)=>{
      const inp = ev.target.closest("input[data-act]");
      if(!inp) return;
      if(inp.dataset.act==="setEl"){
        setPickElements(inp.dataset.bg, inp.dataset.pick, inp.value);
      }
    });

	el.addEventListener("change", (ev)=>{
	  const t = ev.target;
	  if(t && t.matches('input[data-act="togUp"]')){
		toggleUpgrade(t.dataset.bg, t.dataset.pick, t.dataset.up, t.checked);
		return;
	  }
	  if(t && t.matches('select[data-act="upChoice"]')){
		setUpgradeChoice(t.dataset.bg, t.dataset.pick, t.dataset.up, t.value);
		return;
	  }
	  if(t && t.matches('select[data-act="upCount"]')){
		setUpgradeCount(t.dataset.bg, t.dataset.pick, t.dataset.up, t.value);
		return;
	  }
	});
  }
}


/* ===========================================================
   14) ROSTER OUTPUT
   =========================================================== */

function buildRosterText(){
  const cmd = getCommander(state.commanderId);
  const totals = forceTotals();
  const refs = collectArmyRefs();

  let out = "";
  out += `PLAYER: ${state.playerName || "—"}\n`;
  out += `FACTION: ${state.faction}\n`;
  out += `FORCE: ${state.forceName || "—"}\n`;
  out += `COMMANDER: ${cmd ? cmd.name : "—"} (${cmd ? cmd.points : 0} pts)\n`;
  out += `MFV: ${state.mfv} pts\n`;
  out += `TOTAL: ${totals.pts} pts • TOTAL BR: ${totals.br}\n`;
  out += `============================================================\n\n`;

  out += `BATTLEGROUPS\n`;
  out += `------------------------------------------------------------\n`;
  for(const bg of state.battleGroups){
    const tpl = getBGTemplate(bg.bgTemplateId);
    const t = bgTotals(bg);
    out += `• ${tpl?.name || "Battle Group"} — ${t.pts} pts • BR ${t.br}\n`;

    const sr = bgSpecialRulesText(tpl);
    if(sr){
      out += `  SPECIAL RULES:\n`;
      for(const line of sr.split("\n")) out += `    - ${line}\n`;
    }

    for(const p of bg.picks){
      const u = getUnit(p.unitId);
      if(!u) continue;
      const req = isPickRequired(bg, p.pickId) ? "REQ" : "OPT";
      const el = displayElementsCount(u,p);
      out += `  - [${req}] ${u.name} • ${formatTypeShort(u)} • El ${el} • BR ${pickBR(u,p)} • ${pickPoints(u,p)} pts\n`;

      const bonusReact = Number(p?.bgBonus?.reactBonus || 0);
      const bonusTags = (p?.bgBonus?.addTags || []);
      if(bonusReact || bonusTags.length){
        out += `      BG BONUS:`;
        if(bonusReact) out += ` +${bonusReact} React`;
        if(bonusTags.length) out += `; ${bonusTags.join(", ")}`;
        out += ` (free)\n`;
      }
    }
  }
  out += `\n`;

  out += `RULES IN THIS FORCE\n`;
  out += `------------------------------------------------------------\n`;
  for(const r of refs.rules) out += `- ${normalizedDisplayName(r)}: ${String(ruleReminder(r)).replace(/\n/g," ")}\n`;
  return out;
}


/* ===========================================================
   15) JSON SAVE/LOAD
   =========================================================== */

function downloadJSON(){
  const totals = forceTotals();
  const blob = new Blob([JSON.stringify(state, null, 2)], { type:"application/json" });
  const a = document.createElement("a");
  const safeForce = (state.forceName||"force").toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"");
  a.download = `${state.faction.toLowerCase()}_${totals.pts}pts_${safeForce}.json`;
  a.href = URL.createObjectURL(blob);
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 0);
}

function loadJSONFile(file){
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const loaded = JSON.parse(reader.result);
      if(!loaded || loaded.version !== state.version) throw new Error("Not a valid save for this builder version.");
      state = loaded;

      state.printOptions ||= {
        showRoster: true,
        showRulesTable: true,

        showRosterReqOpt: true,
        showRosterType: true,
        showRosterElements: true,
        showRosterWargear: true,
        showRosterUnitRules: true,
        showRosterBR: true,
        showRosterPts: true,

        showUnitStats: false,
        showWeaponStats: false
      };

      if(!DB.FACTIONS[state.faction]) state.faction = "UNSC";

      const cmds = Object.values(commandersForFaction(state.faction));
      if(!cmds.some(c=>c.id===state.commanderId)){
        state.commanderId = cmds[0]?.id || "";
      }

      const validBGs = bgsForFaction(state.faction);
      state.battleGroups = (state.battleGroups||[]).filter(bg => !!validBGs[bg.bgTemplateId]);

      // Ensure bgBonus exists on picks after load (older saves)
      for(const bg of (state.battleGroups||[])){
        for(const p of (bg.picks||[])){
          p.bgBonus ||= { reactBonus: 0, addTags: [] };
        }
      }

      render();
      toast("Loaded JSON.");
    }catch(e){
      alert("Could not load JSON: " + e.message);
    }
  };
  reader.readAsText(file);
}


/* ===========================================================
   16) PRINT VIEW + PDF EXPORT
   =========================================================== */

function buildPrintView(){
  applyTheme(state.faction);

  const po = state.printOptions || {};
  const showRoster = po.showRoster !== false;
  const showRulesTable = po.showRulesTable !== false;
  const showUnitRulesCol = po.showRosterUnitRules !== false;
  const showUnitStatsCol = !!po.showUnitStats;
  const showWeaponStats = !!po.showWeaponStats;

  $("#printRosterBox").style.display = showRoster ? "" : "none";
  $("#printRulesBox").style.display = showRulesTable ? "" : "none";

  const totals = forceTotals();
  const cmd = getCommander(state.commanderId);
  const refs = collectArmyRefs();

  $("#pTitle").textContent = `${state.forceName || "Force"} — ${state.faction}`;
  $("#pSub").textContent = `Player: ${state.playerName || "—"} • Commander: ${cmd?.name || "—"} • Total: ${totals.pts}/${state.mfv} pts • BR: ${totals.br}`;

  $("#pPills").innerHTML = [
    pillHtml(`Total`, `${totals.pts} pts`),
    pillHtml(`MFV`, `${state.mfv} pts`),
    pillHtml(`BR`, `${totals.br}`),
    pillHtml(`Commander`, `${cmd?.orderDice ?? 0} OD`)
  ].join("");

  if(showRoster){
    const roster = $("#pRosterTable");

    const cols = [
      { key:"unit",     label:"Unit",    width:"26%" },
      { key:"reqopt",   label:"Req/Opt", width:"9%",  on: po.showRosterReqOpt !== false },
      { key:"type",     label:"Type",    width:"10%", on: po.showRosterType !== false },
      { key:"elements", label:"Elements",width:"8%",  on: po.showRosterElements !== false },
      { key:"stats",    label:"Stats",   width:"18%", on: showUnitStatsCol },
      { key:"wargear",  label: showWeaponStats ? "Weapons (with stats) / Upgrades" : "Wargear / Upgrades", width:"20%", on: (po.showRosterWargear !== false) || showWeaponStats },
      { key:"rules",    label:"Unit Rules", width:"17%", on: showUnitRulesCol },
      { key:"br",       label:"BR",      width:"5%",  on: po.showRosterBR !== false },
      { key:"pts",      label:"Pts",     width:"5%",  on: po.showRosterPts !== false }
    ].filter(c => c.on !== false);

    roster.innerHTML = `
      <thead class="printHeaderRow">
        <tr>
          ${cols.map(c=>`<th style="width:${c.width};">${c.label}</th>`).join("")}
        </tr>
      </thead>
      <tbody></tbody>
    `;
    const rb = roster.querySelector("tbody");

    if(cmd){
      const rowCells = {
        unit: `<td><b>${escapeHtml(cmd.name)}</b></td>`,
        reqopt: `<td><span class="printMuted">—</span></td>`,
        type: `<td>Commander</td>`,
        elements: `<td>—</td>`,
        stats: `<td class="printMuted">—</td>`,
        wargear: `<td>${escapeHtml((cmd.standardOrders||[]).join(", "))}${cmd.uniqueAbility ? `<br><span class="printMuted">${escapeHtml(cmd.uniqueAbility)}</span>` : ""}</td>`,
        rules: `<td class="printMuted">—</td>`,
        br: `<td>—</td>`,
        pts: `<td><b>${cmd.points}</b></td>`
      };
      rb.innerHTML += `<tr>${cols.map(c=>rowCells[c.key] || "<td>—</td>").join("")}</tr>`;
    }

    for(const bg of state.battleGroups){
      const tpl = getBGTemplate(bg.bgTemplateId);
      const t = bgTotals(bg);

      rb.innerHTML += `
        <tr class="printSectionRow">
          <td colspan="${cols.length}">${escapeHtml(tpl?.name || "Battle Group")} • ${t.pts} pts • BR ${t.br}</td>
        </tr>
      `;

      const sr = bgSpecialRulesText(tpl);
      if(sr){
        rb.innerHTML += `
          <tr class="printNoteRow">
            <td colspan="${cols.length}">
              <b>Special Rules:</b><br>${escapeHtml(sr).replace(/\n/g,"<br>")}
            </td>
          </tr>
        `;
      }

      for(const p of bg.picks){
        const u = getUnit(p.unitId);
        if(!u) continue;

        const req = isPickRequired(bg, p.pickId);
        const badge = req
          ? `<span class="badge badgeReq">Required</span>`
          : `<span class="badge badgeOpt">Optional</span>`;

        const elCount = displayElementsCount(u,p);
        const ups = displayUpgrades(u,p);
        const rules = pickUnitRulesForColumn(u,p);

        const weaponsBlock = showWeaponStats
          ? weaponsText(u, p, true)
          : (u.weapons?.map(w=>w.name).join(", ") || "—");

        const wargearHtml = showWeaponStats
          ? escapeHtml(weaponsBlock).replace(/\n/g,"<br>") + (ups ? `<br><span class="printMuted">${escapeHtml(ups)}</span>` : "")
          : `${escapeHtml(weaponsBlock)}${ups ? `<br><span class="printMuted">${escapeHtml(ups)}</span>` : ""}`;

        const rowCells = {
          unit: `<td><b>${escapeHtml(u.name)}</b></td>`,
          reqopt: `<td>${badge}</td>`,
          type: `<td>${escapeHtml(formatTypeShort(u))}</td>`,
          elements: `<td>${escapeHtml(elCount)}</td>`,
          stats: `<td class="printMuted">${escapeHtml(unitStatsText(u,p))}</td>`,
          wargear: `<td>${wargearHtml}</td>`,
          rules: `<td class="printMuted">${escapeHtml(rules || "—")}</td>`,
          br: `<td>${pickBR(u,p)}</td>`,
          pts: `<td><b>${pickPoints(u,p)}</b></td>`
        };

        rb.innerHTML += `<tr>${cols.map(c=>rowCells[c.key] || "<td>—</td>").join("")}</tr>`;
      }

      const v = validateBG(bg);
      if(v.missing.length){
        rb.innerHTML += `
          <tr class="printIssueRow">
            <td colspan="${cols.length}"><b>Missing requirements:</b> ${escapeHtml(v.missing.join(" • "))}</td>
          </tr>
        `;
      }
      if(v.extraIssues.length){
        rb.innerHTML += `
          <tr class="printIssueRow">
            <td colspan="${cols.length}"><b>Issues:</b> ${escapeHtml(v.extraIssues.join(" • "))}</td>
          </tr>
        `;
      }
    }
  }

  if(showRulesTable){
    const rTable = $("#pRulesTable");
    rTable.innerHTML = `
      <thead class="printHeaderRow">
        <tr>
          <th style="width:34%;">Rule</th>
          <th>Reminder</th>
        </tr>
      </thead>
      <tbody></tbody>
    `;
    const tb = rTable.querySelector("tbody");

    for(const r of refs.rules){
      const rem = ruleReminder(r);
      const isCmdRow = r.startsWith("Order Dice:") || r.startsWith("Order:") || r.startsWith("Commander Ability:");
      tb.innerHTML += `
        <tr class="${isCmdRow ? "printCmdRow" : ""}">
          <td><b>${escapeHtml(normalizedDisplayName(r))}</b></td>
          <td>${escapeHtml(String(rem)).replace(/\n/g,"<br>")}</td>
        </tr>
      `;
    }
  } else {
    $("#pRulesTable").innerHTML = "";
  }
}

function exportToPDF(){
  buildPrintView();

  const totals = forceTotals();
  const exportTitle = `${state.faction}_${totals.pts}pts`;

  const f = DB.FACTIONS[state.faction] || DB.FACTIONS.UNSC;
  const {r,g,b} = hexToRgb(f.accent);
  const injectedVars = `
    :root{
      --accent:${f.accent};
      --accent2:${f.accent2};
      --accentLight: rgba(${r},${g},${b},.12);
      --accentLighter: rgba(${r},${g},${b},.08);
    }
  `;

  const styleText = document.querySelector("style")?.innerHTML || "";
  const printHtml = document.getElementById("printWrap").outerHTML;

  const w = window.open("", "_blank");
  if(!w){
    alert("Pop-up blocked. Allow pop-ups for this file to export PDF.");
    return;
  }

  w.document.open();
  w.document.write(`<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>${exportTitle}</title>
<style>${styleText}</style>
<style>${injectedVars}</style>
<style>
  body{ background:#fff !important; }
  .printWrap{ display:block !important; }
  header, main{ display:none !important; }
</style>
</head>
<body>
${printHtml}
<script>
  document.title = ${JSON.stringify(exportTitle)};
  setTimeout(()=>{ window.print(); }, 250);
<\/script>
</body>
</html>`);
  w.document.close();
}

function pillHtml(k,v){
  return `<span class="pill"><b>${escapeHtml(k)}</b>&nbsp;${escapeHtml(v)}</span>`;
}


/* ===========================================================
   17) EVENTS
   =========================================================== */

function wireEvents(){
  $("#playerName").addEventListener("input", e=>{ state.playerName = e.target.value; render(); });
  $("#forceName").addEventListener("input", e=>{ state.forceName = e.target.value; render(); });
  $("#mfv").addEventListener("input", e=>{ state.mfv = Number(e.target.value||0); render(); });

  $("#faction").addEventListener("change", e=>{
    state.faction = e.target.value;

    const cmds = Object.values(commandersForFaction(state.faction));
    state.commanderId = cmds[0]?.id || "";

    state.battleGroups = [];
    render();
  });

  $("#commanderSelect").addEventListener("change", e=>{ state.commanderId = e.target.value; render(); });

  // PDF option toggles
  $("#optShowUnitRules").addEventListener("change", e=>{ state.printOptions.showRosterUnitRules = e.target.checked; });
  $("#optShowRulesTable").addEventListener("change", e=>{ state.printOptions.showRulesTable = e.target.checked; });
  $("#optShowUnitStats").addEventListener("change", e=>{ state.printOptions.showUnitStats = e.target.checked; });
  $("#optShowWeaponStats").addEventListener("change", e=>{ state.printOptions.showWeaponStats = e.target.checked; });

  $("#btnAddBg").addEventListener("click", ()=>{
    const id = $("#bgTypeSelect").value;
    addBattleGroup(id);
  });

  $("#btnSaveJson").addEventListener("click", downloadJSON);

  $("#fileJson").addEventListener("change", e=>{
    if(e.target.files?.[0]) loadJSONFile(e.target.files[0]);
    e.target.value="";
  });

  $("#btnExportPdf").addEventListener("click", exportToPDF);

  const copyBtn = document.getElementById("btnCopyRoster");
  if(copyBtn){
    copyBtn.addEventListener("click", copyRosterToClipboard);
  }

  $("#btnReset").addEventListener("click", ()=>{
    if(!confirm("Reset force? This clears battle groups and picks.")) return;
    state.battleGroups = [];
    render();
  });
}

function copyRosterToClipboard(){
  const ta = document.getElementById("output");
  const text = ta?.value || "";
  if(!text){ toast("Nothing to copy."); return; }

  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text).then(()=>{
      toast("Roster copied!");
    }).catch(()=>{
      ta.focus();
      ta.select();
      try{
        document.execCommand("copy");
        toast("Roster copied!");
      }catch(e){
        toast("Copy failed. Select text manually.");
      }
      window.getSelection?.().removeAllRanges?.();
    });
    return;
  }

  ta.focus();
  ta.select();
  try{
    document.execCommand("copy");
    toast("Roster copied!");
  }catch(e){
    toast("Copy failed. Select text manually.");
  }
  window.getSelection?.().removeAllRanges?.();
}


/* ===========================================================
   18) DATA VALIDATION (NO STORAGE)
   Helps catch broken IDs when you add units
   =========================================================== */

function validateDB(){
  const issues = [];

  for(const [fac, bgs] of Object.entries(DB.BATTLEGROUPS || {})){
    for(const bg of Object.values(bgs || {})){
      for(const req of (bg.required || [])){
        for(const uid of (req.allowed || [])){
          if(!DB.UNITS?.[fac]?.[uid]){
            issues.push(`Missing unit ID in BG ${bg.id}: ${uid} (faction ${fac})`);
          }
        }
      }
    }
  }

  if(issues.length){
    console.warn("DB issues:\n" + issues.join("\n"));
    toast(`DB issues: ${issues.length} (see console)`);
  }
}


/* ===========================================================
   19) INIT
   =========================================================== */

applyTheme(state.faction);
validateDB();     // ✅ does NOT save anything; just warns if broken
wireEvents();
render();
