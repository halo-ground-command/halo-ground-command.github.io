<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Halo: Bolt Action Army Builder</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
body {
  background: #202034;
  color: #f8f8fa;
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
}
.container {
  max-width: 1000px;
  margin: 32px auto;
  background: #232345;
  border-radius: 18px;
  padding: 36px 30px 26px 30px;
  box-shadow: 0 0 36px #000c;
  display: flex;
  flex-direction: row;
  gap: 38px;
  align-items: flex-start;
}
.main-content {
  flex: 1 1 0;
  min-width: 0;
}
.faction-select {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin: 38px 0 40px 0;
}
.faction-select button {
  font-size: 1.25em;
  min-width: 148px;
  padding: 20px 0;
}
.back-btn {
  display: none;
  background: #222b5b;
  font-size: 1.08em;
  border-radius: 7px;
  padding: 7px 18px;
  border: none;
  color: #fff;
  margin-bottom: 15px;
  transition: background .16s;
  width: auto;
  position: static;
}
.back-btn:hover { background: #2e50b7; }
.control-row {
  display: flex;
  flex-wrap: wrap;
  gap: 13px;
  align-items: center;
  margin-bottom: 27px;
}
.control-row select {
  font-size: 1em;
  background: #18182d;
  color: #f8f8fa;
  border-radius: 5px;
  border: 1px solid #223;
  padding: 7px 10px;
  min-width: 95px;
}
.army-list { margin: 22px 0 12px 0; }
.card {
  background: #242448;
  margin-bottom: 16px;
  border-radius: 8px;
  padding: 15px 18px 18px 18px;
  box-shadow: 0 2px 10px #0006;
}
.card h3 { margin: 0 0 7px 0; font-size: 1.13em; }
.card .details { margin: 4px 0 0 0; font-size: 0.98em; }
.card .details b { font-weight: 600; }
.remove-btn, .edit-btn {
  width: 48%;
  font-weight: bold;
  margin: 8px 1% 0 1%;
  padding: 8px 0;
  border-radius: 6px;
  display: inline-block;
  float: none;
}
.remove-btn { background: #b33b4b; }
.remove-btn:hover { background: #d34040; }
.edit-btn { background: #333; }
.edit-btn:hover { background: #555; }
button {
  background: #355fdc;
  color: #fff;
  border: none;
  padding: 8px 19px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 1em;
  transition: background .16s;
}
button.active, .faction-select button.active { background: #0e326e; font-weight: bold; }
button:not(.active):hover { background: #2e50b7; }
.total-points {
  margin: 18px 0 0 0;
  font-size: 1.22em;
  text-align: right;
  background: #1c1c38;
  border-radius: 9px;
  padding: 12px 0;
  font-weight: 700;
  letter-spacing: .01em;
}
.sticky-sidebar {
  position: sticky;
  top: 38px;
  right: 0;
  background: #242448;
  border-radius: 12px;
  box-shadow: 0 2px 18px #0008;
  padding: 24px 18px 20px 18px;
  min-width: 210px;
  color: #e0e6f0;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.sticky-sidebar button {
  margin: 0 0 5px 0;
  width: 100%;
}
.sticky-sidebar .back-btn {
  background: #355fdc;
  color: #fff;
  font-weight: bold;
  border-radius: 7px;
  margin-bottom: 10px;
  display: block;
}
.sticky-sidebar .pdf-btn, .sticky-sidebar .save-btn {
  background: #355fdc;
  color: #fff;
  border-radius: 7px;
}
.sticky-sidebar .pdf-btn:hover, .sticky-sidebar .save-btn:hover, .sticky-sidebar .back-btn:hover {
  background: #2e50b7;
}

/* ======= MODAL FIX: SCROLLABLE CONTENT ======= */
.modal-bg {
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0,0,0,0.65);
  display: none;              /* default hidden */
  align-items: center;
  justify-content: center;
}

.modal {
  background: #242448;
  color: #f8f8fa;
  border-radius: 16px;
  padding: 38px 36px;
  box-shadow: 0 0 28px #000b;
  min-width: 320px; min-height: 110px;
  max-width: 97vw;
  max-height: 87vh;      /* Fix: cap modal height */
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#modalFields {
  flex: 1 1 auto;
  min-height: 0;
  overflow-y: auto;      /* Fix: scrollable content */
  margin-bottom: 18px;
  max-height: 54vh;      /* Tweak this if needed */
}
.modal label { display:block; margin-bottom:6px; }
.modal input[type="number"] { width:62px; }
.cost-preview {
  margin: 11px 0 14px 0;
  color: #7affb7;
  font-size: 1.14em;
  font-weight: 600;
  background: #192830;
  border-radius: 8px;
  padding: 10px 16px;
  display: inline-block;
  box-shadow: 0 1px 6px #1115;
}
@media (max-width: 1100px) {
  .container { flex-direction: column; gap: 0; max-width: 98vw; }
  .sticky-sidebar {
    position: static;
    margin: 0 auto 16px auto;
    min-width: 180px;
    width: 94vw;
    max-width: 380px;
  }
  .main-content { width: 100%; }
}
@media (max-width: 730px) {
  .container { padding: 10px 1vw 20px 1vw; }
  .faction-select { gap: 10px; }
  .control-row { flex-direction: column; gap: 8px; }
  .total-points { text-align: left; }
  .modal { min-width: unset; padding: 19px 5vw; }
  #modalFields { max-height: 38vh; }
}
  </style>
</head>
<body>
  <div class="container">
    <div class="main-content">
      <button class="back-btn" id="backBtn" onclick="goBackToFaction()">&#8592; Back to Faction Select</button>
      <h1 style="text-align:center;margin-bottom:18px; font-size:2.3em; font-weight:800;">Halo: Bolt Action Army Builder</h1>
		<div class="faction-select" id="factionSelectRow">
		  <button onclick="selectFaction('UNSC')" id="btnUNSC">UNSC</button>
		  <button onclick="selectFaction('Covenant')" id="btnCovenant">Covenant</button>
		  <button onclick="selectFaction('Banished')" id="btnBanished">Banished</button>
		  <button onclick="selectFaction('Forerunner')" id="btnForerunner">Forerunner</button>
		  <button onclick="selectFaction('Flood')" id="btnFlood">Flood</button>
		  <button onclick="selectFaction('Other')" id="btnOther" style="display:none">Other Faction</button>
		</div>
		<div class="control-row" id="addControls" style="display:none;">
		  <select id="unitSelect"></select>
		  <select id="veterancySelect"></select>
		  <select id="armyBonusSelect" style="display:none;" onchange="onArmyBonusChange()"></select>
		  <button onclick="addSelectedUnit()">Add</button>
		  <!-- PDF button REMOVED here -->
		</div>
      <div class="army-list" id="armyList"></div>
      <div class="total-points" id="totalPointsDiv"></div>
    </div>
    <div class="sticky-sidebar" id="sidebar" style="display:none;">
      <button class="back-btn" onclick="goBackToFaction()">← Back</button>
      <button class="save-btn" onclick="saveList()">💾 Save List</button>
      <button class="save-btn" onclick="loadList()">📂 Load List</button>
      <button class="pdf-btn" onclick="exportPdf()">Export as PDF</button>
      <div id="summaryBlock" style="margin-top:22px;font-size:1.09em;"></div>
    </div>
  </div>

  <!-- Modal for editing -->
  <div class="modal-bg" id="editModalBg">
    <div class="modal" id="editModal">
      <div id="modalFields"></div>
      <div class="cost-preview" id="modalCostPreview"></div>
      <div style="margin-top:15px;">
        <button onclick="saveEdit()">Save</button>
        <button onclick="closeEditModal()" style="background:#b33b4b;margin-left:10px;">Cancel</button>
      </div>
    </div>
  </div>

// --- Weapon Special Rule Descriptions ---
const weaponSpecialDescriptions = {
  "Assault": "No -1 to hit when moving and shooting. Models with an Assault weapon gain Tough Fighters, re-rolling in close combat.",
  "Battery Charge": "Has a -1 penalty to hit when shooting.",
  "Cover Negation": "When this weapon hits an Infantry or Artillery unit that is in soft cover and not Down, any natural 6 rolled to wound worsens the target’s cover save by one step, for that wound only.",

// --- Unit Special Rule Descriptions ---
window.unitSpecialDescriptions = {
  "Automaton": "Cannot receive Ambush orders, ignore Horror's -1 morale effect and immune to Flood Infection, cannot benefit from medics or 'You men, snap to action!' orders.",

// Add Doctrine Special Rules to unit for display/export (helper function)
function addDoctrineSpecialRules(unit) {
  if (!window.currentFaction || !unit) return;

  let triggerRule, doctrineSet, doctrineName;

  if (window.currentFaction === "UNSC") {
    triggerRule = "For Humanity’s Survival!";
    doctrineSet = UNSC_DOCTRINES;
    doctrineName = unit.doctrine;
  } else if (window.currentFaction === "Covenant") {
    triggerRule = "For The Great Journey!";
    doctrineSet = COVENANT_DOCTRINES;
    doctrineName = unit.doctrine;
  } else if (window.currentFaction === "Banished") {
    triggerRule = "Forged In Chains";
    doctrineSet = BANISHED_DOCTRINES;
    doctrineName = unit.doctrine;
  } else {
    return;
  }

  if (!Array.isArray(unit.special)) unit.special = [];

  // Remove any existing triggerRule or Doctrine lines (cleanup!)
  unit.special = unit.special.filter(r => typeof r !== "string" || (
    r !== triggerRule &&
    !r.startsWith(triggerRule + " [") &&
    !r.startsWith("Doctrine [") &&
    !r.startsWith(`${window.currentFaction} Doctrine [`)
  ));

  // If a doctrine is chosen, inject only the bracketed rule and doctrine rules
  if (doctrineName && doctrineSet && doctrineSet[doctrineName]) {
    const doctrine = doctrineSet[doctrineName];
    const doctrineLabel = `${triggerRule} [${doctrine.label}]`;
    unit.special.unshift(doctrineLabel);

    // Add doctrine special rules (no duplicates)
    (doctrine.specialRules || []).forEach(rule => {
      if (rule && !unit.special.includes(rule)) unit.special.push(rule);
    });
  } else {
    // If NO doctrine, show the faction default label
    const defaultLabel = doctrineSet?._defaultLabel;
    unit.special.unshift(defaultLabel ? `${triggerRule} [${defaultLabel}]` : triggerRule);
  }
}

function getDisplayDamage(unit) {
  // vehicles & walkers already carry their own damageValue field
  if (unit && unit.damageValue) return unit.damageValue;

  // infantry + teams: derive it from veterancy / Resilient
  if (unit && (unit.type === "Infantry" || unit.type === "Team")) {
    const specials = Array.isArray(unit.special)
      ? unit.special
      : unit.special
      ? [unit.special]
      : [];

    // accept either a raw string or an object { name, description }
    const hasResilient = specials.some(s =>
      typeof s === "string"
        ? s.includes("Resilient")
        : s?.name === "Resilient"
    );
    if (hasResilient) return "6+";

    switch (unit.veterancy) {
      case "Inexperienced":
        return "3+";
      case "Veteran":
        return "5+";
      default:
        return "4+";
    }
  }

  return "";
}


// GLOBAL HELPER: Robust base weapon name extractor
function getBaseWeaponName(label) {
  if (!label) return "";

  let s = String(label).trim();

  // 1) strip leading quantity (e.g. "2x", "4x")
  s = s.replace(/^\s*\d+\s*x?\s*/i, "");

  // 2) normalize punctuation / unicode
  s = s.replace(/[“”]/g, '"').replace(/[’]/g, "'");

  // 3) remove common mounting/prefix phrases using regex on the FULL string
  const prefixPatterns = [
    /\bcasement[- ]mounted\b/ig,
    /\bforward[- ]facing\b/ig,
    /\bhull[- ]mounted\b/ig,
    /\bturret[- ]mounted\b/ig,
    /\bpintle[- ]mounted\b/ig,
    /\bsponson[- ]mounted\b/ig,
    /\bco[- ]axial\b/ig,
    /\bcoaxial\b/ig,
    /\bquad[- ]linked\b/ig,
    /\btriple[- ]linked\b/ig,
    /\btwin[- ]linked\b/ig,
    /\bdual[- ]?\b/ig,
    /\brear[- ]?\b/ig,
    /\bside[- ]mounted\b/ig,
    /\bmounted\b/ig,
	/\bpaired\b/ig,
    /\bcovering\b/ig,
    /\bfront arc\b/ig,
    /\bleft arc\b/ig,
    /\bright arc\b/ig,
    /\brear arc\b/ig,
    /\b360°\s*arc\s*of\s*fire\b/ig,
  ];
  prefixPatterns.forEach(r => { s = s.replace(r, " "); });

  // 4) normalize whitespace + plural “cannons”
  s = s.replace(/\bcannons\b/ig, "cannon");
  s = s.replace(/\s+/g, " ").trim();

  // 5) Try exact key match (case-sensitive keys, so try both)
  if (allWeaponProfiles[s]) return s;

  // 6) Try longest span match (up to 6 words now that we cleaned better)
  const words = s.split(" ").filter(Boolean);
  for (let span = Math.min(words.length, 6); span >= 1; span--) {
    for (let i = 0; i <= words.length - span; i++) {
      let tryStr = words.slice(i, i + span).join(" ");
      if (allWeaponProfiles[tryStr]) return tryStr;

      // trailing plural fix
      if (tryStr.endsWith("s") && allWeaponProfiles[tryStr.slice(0, -1)]) return tryStr.slice(0, -1);
    }
  }

  // 7) Fuzzy (case-insensitive) both directions
  const lower = s.toLowerCase();
  for (const key of Object.keys(allWeaponProfiles)) {
    const k = key.toLowerCase();
    if (k.includes(lower) || lower.includes(k)) return key;
  }

  return s;
}

// --- AUTO-INJECT DOCTRINE OPTION BLOCK TO ALL ELIGIBLE UNITS ---
function injectDoctrineOptions(units, doctrineSet, triggerRule) {
  (units || []).forEach(unit => {
    if (Array.isArray(unit.specialRules) && unit.specialRules.includes(triggerRule)) {
      // Already has doctrine block? (Don't overwrite)
      if (unit.options && unit.options.doctrine) return;

      // If no options, create
      if (!unit.options) unit.options = {};

      // Build list of choices matching allowed veterancy for this unit
      const allowedVets = Array.isArray(unit.allowedVeterancy) ? unit.allowedVeterancy : [];
      const choices = Object.values(doctrineSet || {})
        .filter(doc => Array.isArray(doc.allowedVeterancy) && doc.allowedVeterancy.some(v => allowedVets.includes(v)))
        .map(doc => ({
          name: doc.label,
          costPerModel: doc.baseCostPerModel,
          specialRules: (doc.specialRules || []).slice(),
          extraUpgrades: (doc.upgrades && doc.upgrades.length) ? doc.upgrades.slice() : []
        }));

      if (choices.length) {
        unit.options.doctrine = {
          label: "Doctrine",
          defaultLabel: doctrineSet._defaultLabel || "Default",
          choices
        };
      }
    }
  });
}

// --- Parse a weapon profile string into stat fields ---
function parseWeaponProfile(profileStr) {
  if (!profileStr) return { range: "", shots: "", pen: "", special: "" };
  let match = String(profileStr).match(/Range ([^,]+), Shots ([^,]+), Pen ([^,]+), ?(.*)/);
  if (!match) return { range: "", shots: "", pen: "", special: "" };
  return {
    range: match[1].trim(),
    shots: match[2].trim(),
    pen: match[3].trim(),
    special: match[4] ? match[4].trim() : ""
  };
}

function buildWeaponsTable(unit) {
  let table = [];
  const unitData = getUnitData(unit);

  if (!unit || !unitData) return table;

  // 1. SPECIAL CASE: Sniper Teams (only these two units!)
  const isSniperTeam =
    unit.type === "Team" &&
    unit.name === "Sniper Team" &&
    Array.isArray(unitData.weapons) &&
    unitData.weapons.length === 2 &&
    unitData.baseMen === 2 &&
    unitData.maxMen === 2;

  if (isSniperTeam) {
    unitData.weapons.forEach(w => {
      let prof = parseWeaponProfile(allWeaponProfiles[getBaseWeaponName(w.name)] || "");
      table.push({
        qty: 1,
        label: `${w.name}`,
        ...prof
      });
    });
    return table;
  }

  // 2. "Choose any" INFANTRY/TEAM: Multiple weapons, no swaps
  const isChooseAny = (
    (unit.type === "Infantry" || unit.type === "Team") &&
    !unit.weaponReplacements &&
    (!unit.options || !unit.options.weaponReplacements) &&
    Array.isArray(unitData.weapons) && unitData.weapons.length > 1
  );

  if (isChooseAny) {
    // Show all available weapons, qty = unit.men (or 1)
    const count = unit.men || unitData.baseMen || 1;
    unitData.weapons.forEach(w => {
      let prof = parseWeaponProfile(allWeaponProfiles[getBaseWeaponName(w.name)] || "");
      table.push({
        qty: count,
        label: (count > 1 ? `${count}x ` : "") + w.name,
        ...prof
      });
    });
    return table;
  }

  // 3. INFANTRY SQUADS (multi-man, with possible weapon swaps)
  if (unit.type === "Infantry" && unit.men > 1) {
    let menLeft = unit.men - 1; // NCO is separate
    let weaponCounts = {};

    // Weapon replacements
    if (unit.weaponReplacements && unitData.options?.weaponReplacements) {
      Object.entries(unit.weaponReplacements).forEach(([upgradeLabel, cnt]) => {
        if (cnt > 0) {
          const repl = unitData.options.weaponReplacements[upgradeLabel];
          if (repl && repl.grants && repl.replaces) {
            weaponCounts[repl.grants] = (weaponCounts[repl.grants] || 0) + cnt;
            menLeft -= cnt;
          }
        }
      });
    }

    let defaultWeapon = unitData.weapons?.[0]?.name || "Plasma Pistol";
    if (menLeft > 0) {
      weaponCounts[defaultWeapon] = (weaponCounts[defaultWeapon] || 0) + menLeft;
    }

    // Output all trooper rows
    Object.entries(weaponCounts).forEach(([weapon, count]) => {
      let prof = parseWeaponProfile(allWeaponProfiles[getBaseWeaponName(weapon)] || "");
      table.push({
        qty: count,
        label: count > 1 ? `${count}x ${weapon}` : weapon,
        ...prof
      });
    });

    // NCO weapon (from unit.ncoReplacement if present, otherwise default)
    let ncoWeapon =
      unit.ncoReplacement ||
      (unitData.options?.ncoReplacement?.options?.[0] || unitData.weapons?.[0]?.name || "Plasma Pistol");

    let ncoProf = parseWeaponProfile(allWeaponProfiles[getBaseWeaponName(ncoWeapon)] || "");
    table.push({
      qty: 1,
      label: `NCO: ${ncoWeapon}`,
      ...ncoProf
    });

    return table;
  }

  // 4. SINGLE-MODEL INFANTRY OR TEAM (e.g., sniper, hero, FO)
  if ((unit.type === "Infantry" || unit.type === "Team") && unit.men === 1 && Array.isArray(unitData.weapons)) {
    unitData.weapons.forEach(w => {
      let prof = parseWeaponProfile(allWeaponProfiles[getBaseWeaponName(w.name)] || "");
      table.push({
        qty: 1,
        label: `${w.name}`,
        ...prof
      });
    });
    return table;
  }

  // 5. VEHICLES/CREW-SERVED/ANYTHING ELSE
  if (unit.type !== "Infantry") {
    // Group all weapons by label
    const weaponMap = {};
    (unit.weapons || []).forEach(w => {
      const label = typeof w === "string" ? w : w?.name;
      if (!label) return;
      if (!weaponMap[label]) weaponMap[label] = { qty: 0, label };
      weaponMap[label].qty += 1;
    });

    Object.values(weaponMap).forEach(item => {
      const prof = parseWeaponProfile(allWeaponProfiles[getBaseWeaponName(item.label)] || "");
      table.push({
        ...prof,
        qty: item.qty,
        label: (item.qty > 1 ? `${item.qty}x ` : "") + item.label
      });
    });
    return table;
  }

  return table;
}

function canForceCommandVehicle(unit, unitData) {
  if (!unit || !unitData) return false;

  // only vehicles
  if (unit.type === "Infantry" || unit.type === "Team") return false;

  // aircraft may only be Command Vehicles if their profile already has it
  // or if they can buy it normally
  if (unit.type === "Aircraft") return false;

  const hasBuiltIn = Array.isArray(unitData.specialRules) &&
    unitData.specialRules.some(r => (typeof r === "string" ? r === "Command Vehicle" : r?.name === "Command Vehicle"));

  const canBuyNormally = !!unitData.options?.weaponUpgrades?.["Command Vehicle"];

  return !hasBuiltIn && !canBuyNormally;
}

// Always use the table that already knows the real quantities
function getFinalWeaponsList(unit) {
  return buildWeaponsTable(unit);
}


// GLOBAL: Lookup reference unit data by name/type and type
function getUnitData(unit) {
  if (!unit || !window.currentFaction) return null;

  // --- Special case: Flood borrowed vehicle (Corrupted Arsenal) ---
  if (window.currentFaction === "Flood" && unit.isFloodBorrowed && unit.sourceFaction) {
    const sourceUnits = window.UNIT_LISTS?.[unit.sourceFaction] || [];
    const sourceVehicles = window.VEHICLE_LISTS?.[unit.sourceFaction] || [];
    const sourceList = sourceUnits.concat(sourceVehicles);

    // Remove the display suffix we added in the selector, if present
    const baseName = String(unit.originalName || unit.name || "").replace(/\s+\[Corrupted Arsenal(?: - .*?)?\]$/, "");

    return sourceList.find(u => u.name === baseName && u.type === unit.type) || null;
  }

  // --- Normal behavior for all other units ---
  const units = (window.UNIT_LISTS?.[window.currentFaction] || []);
  const vehicles = (window.VEHICLE_LISTS?.[window.currentFaction] || []);
  const list = units.concat(vehicles);

  return list.find(u => u.name === unit.name && u.type === unit.type) || null;
}

function unitHasDoctrine(unitData) {
  const s = Array.isArray(unitData?.specialRules) ? unitData.specialRules : [];
  return (
    s.includes("For Humanity’s Survival!") ||
    s.includes("For The Great Journey!") ||
    s.includes("Forged In Chains")
  );
}

function getUnitDisplaySpecialRules(unit, unitData) {
  let displayRules = [];
  const specials = Array.isArray(unitData?.specialRules) ? unitData.specialRules : [];

  // 1) Add doctrine rules if a doctrine is selected
  const doctrines =
    specials.includes("For Humanity’s Survival!") ? UNSC_DOCTRINES :
    specials.includes("For The Great Journey!")   ? COVENANT_DOCTRINES :
    specials.includes("Forged In Chains")         ? BANISHED_DOCTRINES :
    null;

  if (doctrines && unit.doctrine) {
    const doc = doctrines[unit.doctrine];
    if (doc) {
      if (doc.label) displayRules.push(`[${doc.label} Doctrine]`);
      (doc.specialRules || []).forEach(r => {
        if (r && !displayRules.includes(r)) displayRules.push(r);
      });
    }
  }

  // 2) Add static rules, skipping doctrine triggers
  specials.forEach(rule => {
    if (
      rule !== "For Humanity’s Survival!" &&
      rule !== "For The Great Journey!" &&
      rule !== "Forged In Chains" &&
      !displayRules.includes(rule)
    ) {
      displayRules.push(rule);
    }
  });

  // 3) Add rules from selected doctrine upgrades (and handle replacesRule)
  if (doctrines && unit.doctrine && unit.extraDoctrineUpgrades) {
    const doc = doctrines[unit.doctrine];
    if (doc && Array.isArray(doc.upgrades)) {
      doc.upgrades.forEach(upg => {
        if (!unit.extraDoctrineUpgrades[upg.name]) return;

        if (upg.replacesRule) {
          displayRules = displayRules.filter(r => r !== upg.replacesRule);
        }
        if (upg.grantsRule) {
          const add = r => { if (r && !displayRules.includes(r)) displayRules.push(r); };
          Array.isArray(upg.grantsRule) ? upg.grantsRule.forEach(add) : add(upg.grantsRule);
        }
      });
    }
  }

  return displayRules;
}

// ── GLOBAL helper ── (single definition; previous duplicate removed)
function addRequired(label, allUpgrades, upgradesDef) {
  const upg = upgradesDef?.[label];
  if (!upg || !upg.requires) return;

  const add = dep => {
    if (!dep) return;
    if (!allUpgrades.has(dep)) {
      allUpgrades.add(dep);
      addRequired(dep, allUpgrades, upgradesDef); // recurse
    }
  };

  Array.isArray(upg.requires) ? upg.requires.forEach(add) : add(upg.requires);
}

// Live Cost Preview for Infantry, Teams, and Vehicles
function updateLiveUnitCost() {
  const unit = window.currentEditUnit;
  if (!unit) return;

  const unitData = getUnitData(unit);
  if (!unitData) return;

  // ---- VEHICLE PREVIEW LOGIC ----
  if (unit.type !== "Infantry" && unit.type !== "Team") {
    // Gather selected upgrades
    let upgrades = [];
    document.querySelectorAll(".editVehicleUpgrade:checked").forEach(cb => upgrades.push(cb.value));
    let allUpgrades = new Set(upgrades);

    upgrades.forEach(u => addRequired(u, allUpgrades, unitData.options?.weaponUpgrades));
    let upgradeList = Array.from(allUpgrades);

    // Calculate total cost
    let baseCost = (unitData.costs && unitData.costs[unit.veterancy]) || 0;
    let totalCost = baseCost;
    let upgradesCounted = new Set();

    upgradeList.forEach(upgLabel => {
      const upg = unitData.options?.weaponUpgrades?.[upgLabel];
      if (!upg || upgradesCounted.has(upgLabel)) return;
      totalCost += Number(upg.cost) || 0;
      upgradesCounted.add(upgLabel);
    });

    const forcedCV = document.getElementById("editForcedCommandVehicle");
    if (forcedCV && forcedCV.checked) totalCost += 10;

    // Show preview
    let prevDiv = document.getElementById("modalCostPreview");
    if (prevDiv) prevDiv.innerText = `Cost: ${totalCost} pts (preview)`;
    return;
  }

  // ---- INFANTRY & TEAM LOGIC ----
  let men;
  if (unitData.type === "Team") {
    men = unitData.baseMen;
    if (unitData.options && unitData.options.squadUpgrades) {
      Object.entries(unitData.options.squadUpgrades).forEach(([label, upgrade]) => {
        const cb = document.querySelector(`.editSquadUpgrade[data-upgrade="${label}"]`);
        if (cb && cb.checked && upgrade.addMan) men += upgrade.addMan;
      });
    }
	} else {
	  // Infantry: base men comes from the input (capped by maxMen)
	  const baseMenInputRaw = parseInt(document.getElementById("editMenInput")?.value);
	  const baseMenInput = !isNaN(baseMenInputRaw) ? baseMenInputRaw : (unit.men || unitData.baseMen);
	  const baseMenCapped = Math.min(baseMenInput, unitData.maxMen);

	  // Add bonus men from checked squad upgrades (e.g. Knight Commander)
	  let bonusMen = 0;
	  if (unitData.options?.squadUpgrades) {
		Object.entries(unitData.options.squadUpgrades).forEach(([label, upgrade]) => {
		  const cb = document.querySelector(`.editSquadUpgrade[data-upgrade="${label}"]`);
		  if (cb && cb.checked && upgrade?.addMan) bonusMen += upgrade.addMan;
		});
	  }

	  // IMPORTANT: commander does NOT count toward maxMen
	  men = baseMenCapped + bonusMen;

	  // store how many "bonus" men are free of extraMenCost
	  window.__previewBonusMenNoExtraCost = bonusMen; // because all addMan upgrades should not be charged as extraMenCost
	}

  let veterancy = document.getElementById("editVeterancySelect")?.value || unit.veterancy;
  let baseCost = (unitData.costs && unitData.costs[veterancy]) || 0;
  let extraCost = 0;

  // Extra men cost (Infantry only, not Team)
	if (unitData.type !== "Team" && men > unitData.baseMen && unitData.options?.extraMenCost) {
	  const bonusFree = window.__previewBonusMenNoExtraCost || 0;
	  const paidMen = Math.max(unitData.baseMen, men - bonusFree); // remove commander bonus before charging extraMenCost
	  extraCost = (paidMen - unitData.baseMen) * (unitData.options.extraMenCost[veterancy] || 0);
	}

  // --- Squad Upgrades ---
  let squadUpgradesCost = 0;
  if (unitData.options && unitData.options.squadUpgrades) {
    Object.entries(unitData.options.squadUpgrades).forEach(([label, upgrade]) => {
      const cb = document.querySelector(`.editSquadUpgrade[data-upgrade="${label}"]`);
      if (cb && cb.checked) {
        if (upgrade.perModel === false) {
          squadUpgradesCost += upgrade.cost || 0; // flat cost
        } else {
          squadUpgradesCost += (upgrade.cost || 0) * men; // per model (default)
        }
      }
    });
  }

  // --- Weapon replacements ---
  let weaponReplCost = 0;
  if (unitData.options?.weaponReplacements) {
    Object.entries(unitData.options.weaponReplacements).forEach(([label, spec]) => {
      const n = parseInt(document.querySelector(`.editWeaponReplacement[data-label="${label}"]`)?.value) || 0;
      weaponReplCost += n * (spec.cost || 0);
    });
  }

  // --- NCO replacement ---
  let ncoCost = 0;
  if (unitData.options?.ncoReplacement?.costs) {
    let ncoReplacement = document.getElementById("editNcoReplacement")?.value;
    if (ncoReplacement) ncoCost = unitData.options.ncoReplacement.costs[ncoReplacement] || 0;
  }

  // --- Doctrine & doctrine upgrades ---
  let doctrineCost = 0;
  let extraDoctrineCost = 0;

  if (unitData.options && unitData.options.doctrine) {
    let doctrine = document.getElementById("editDoctrineSelect")?.value;
    let doctrineSpec = (unitData.options.doctrine.choices || []).find(dc => dc.name === doctrine);

    if (doctrineSpec) {
      doctrineCost += (doctrineSpec.costPerModel || 0) * men;

      if (doctrineSpec.extraUpgrades) {
        doctrineSpec.extraUpgrades.forEach(upg => {
          let cb = document.querySelector(`.editDoctrineExtraUpgrade[data-upgrade="${upg.name}"]`);
          if (cb && cb.checked) {
            if (upg.costPerModel) extraDoctrineCost += upg.costPerModel * men;
            if (upg.costFlat) extraDoctrineCost += upg.costFlat;
            if (upg.cost) extraDoctrineCost += upg.cost * men;
          }
        });
      }
    }
  }

  // --- Total up! ---
  let cost = baseCost + extraCost + squadUpgradesCost + weaponReplCost + ncoCost + doctrineCost + extraDoctrineCost;

  // Show preview
  let prevDiv = document.getElementById("modalCostPreview");
  if (prevDiv) prevDiv.innerText = `Cost: ${cost} pts (preview)`;
}

function getUnitsForSelector(faction) {
  // Normal behavior for all factions
  let base = (window.UNIT_LISTS?.[faction] || []).concat(window.VEHICLE_LISTS?.[faction] || []);

  // If not Flood, return normal list
  if (faction !== "Flood") return base;

  // If Flood: add borrowed vehicles from other factions (Inexperienced-capable only)
  const sourceFactions = ["UNSC", "Covenant", "Banished", "Forerunner"];
  let borrowed = [];

  sourceFactions.forEach(srcFaction => {
    const vehicles = window.VEHICLE_LISTS?.[srcFaction] || [];

    vehicles.forEach(v => {
      const vets = Array.isArray(v.allowedVeterancy) ? v.allowedVeterancy : [];

      // Only vehicles that CAN be Inexperienced
      if (!vets.includes("Inexperienced")) return;

      // Clone so we don't modify the original faction vehicle
      const cloned = JSON.parse(JSON.stringify(v));

      // Mark it as borrowed (optional but helpful later)
      cloned.isFloodBorrowed = true;
      cloned.sourceFaction = srcFaction;

      // Force Flood rule: Inexperienced only
      cloned.allowedVeterancy = ["Inexperienced"];

      // Optional label so user can tell where it came from
      cloned.name = `${cloned.name} [Corrupted Arsenal]`;

      borrowed.push(cloned);
    });
  });

  return base.concat(borrowed);
}

function populateUnitSelect() {
  console.log("populateUnitSelect called.");

  console.log("UNIT_LISTS =", window.UNIT_LISTS);
  console.log("VEHICLE_LISTS =", window.VEHICLE_LISTS);

function updateUnitOptions() {
  const idx = document.getElementById("unitSelect").value;
  const faction = window.currentFaction;
  let units = getUnitsForSelector(faction);
  let unit = units[idx];

  const vetSel = document.getElementById("veterancySelect");
  vetSel.innerHTML = "";
  if (!unit) return;

  // Populate dropdown
  (unit.allowedVeterancy || ["Regular"]).forEach(v => {
    let opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    vetSel.appendChild(opt);
  });

  // Force "Regular" as default if present
  let foundRegularIdx = -1;
  for (let i = 0; i < vetSel.options.length; i++) {
    if (vetSel.options[i].value === "Regular") {
      foundRegularIdx = i;
      break;
    }
  }

  if (foundRegularIdx !== -1) {
    vetSel.selectedIndex = foundRegularIdx;
    vetSel.value = "Regular";
    console.log("[DEBUG] Set veterancy to Regular at index", foundRegularIdx);
  } else {
    vetSel.selectedIndex = 0;
    console.log("[DEBUG] No Regular, defaulted to first:", vetSel.options[0]?.value);
  }

  // Double-check after any possible browser quirk
  setTimeout(() => {
    console.log(
      "[POST-TICK] veterancySelect is now:",
      vetSel.value,
      vetSel.selectedIndex,
      Array.from(vetSel.options).map(o => o.value)
    );
  }, 100);
}

// --- Add selected unit to army ---
function addSelectedUnit() {
  const idx = document.getElementById("unitSelect").value;
  const faction = window.currentFaction;
  let units = getUnitsForSelector(faction);
  let unit = units[idx];
  if (!unit) return;

  // Use value from dropdown, as set by updateUnitOptions above
  let dropdownVeterancy = document.getElementById("veterancySelect").value;
  let veterancy = dropdownVeterancy && unit.allowedVeterancy && unit.allowedVeterancy.includes(dropdownVeterancy)
    ? dropdownVeterancy
    : (unit.allowedVeterancy && unit.allowedVeterancy[0]) || "Regular";

  // Defensive fallback for men
  let men = unit.type === "Infantry" ? (unit.baseMen || 0) : undefined;
  let baseCost = (unit.costs && unit.costs[veterancy]) || 0;
  let weapons = Array.isArray(unit.weapons) ? unit.weapons.map(w => ({ ...w })) : [];

  let newUnit = {
    name: unit.name,
    type: unit.type || "",
    veterancy,
    men,
    damageValue: unit.damageValue || "",
    transportCapacity: unit.transportCapacity ?? undefined,
    weapons,
    squadUpgrades: unit.options?.squadUpgrades ? {} : undefined,
    weaponReplacements: unit.options?.weaponReplacements ? {} : undefined,
    ncoReplacement: unit.options?.ncoReplacement ? undefined : undefined,
    doctrine: unit.options?.doctrine ? undefined : undefined,
    extraDoctrineUpgrades: unit.options?.doctrine ? {} : undefined,
    special: Array.isArray(unit.specialRules) ? [...unit.specialRules] : (unit.specialRules ? [unit.specialRules] : []),
    forcedCommandVehicle: false,
	  // ✅ keep source info for Corrupted Arsenal vehicles
	  isFloodBorrowed: !!unit.isFloodBorrowed,
	  sourceFaction: unit.sourceFaction || null,
	  originalName: unit.originalName || unit.name,
	cost: baseCost
  };

  if (typeof newUnit.men === "undefined") newUnit.men = unit.baseMen || 0;

  // Calculate extra men cost for infantry
  if (unit.type === "Infantry" && unit.options?.extraMenCost) {
    let extraMen = newUnit.men - unit.baseMen;
    if (extraMen > 0) {
      let extraMenCost = unit.options.extraMenCost[newUnit.veterancy] || 0;
      newUnit.cost += extraMen * extraMenCost;
      console.log(`[addSelectedUnit] Extra men: +${extraMen} x ${extraMenCost}`);
    }
  }

  // Calculate squad upgrades cost (flat and per model)
  if (unit.options?.squadUpgrades && newUnit.squadUpgrades) {
    let squadUpgradesCost = 0;
    Object.entries(unit.options.squadUpgrades).forEach(([label, upgrade]) => {
      if (newUnit.squadUpgrades[label]) {
        if (upgrade.perModel === false) {
          squadUpgradesCost += upgrade.cost || 0;
        } else {
          squadUpgradesCost += (upgrade.cost || 0) * newUnit.men;
        }
      }
    });
    newUnit.cost += squadUpgradesCost;
    if (squadUpgradesCost > 0) console.log(`[addSelectedUnit] Squad upgrades cost added: ${squadUpgradesCost}`);
  }

  // Always build weaponsTable for export/PDF
  newUnit.weaponsTable = buildWeaponsTable(newUnit);

  console.log("[addSelectedUnit] Added:", newUnit.name, { newUnit });

  window.armyList.push(newUnit);
  renderArmyList();
}

function removeUnit(idx) {
  window.armyList.splice(idx, 1);
  renderArmyList();
}

  }

  modalFields.innerHTML = html;

  // Update cost preview after rendering fields
  setTimeout(updateLiveUnitCost, 10);

  if (unit.type === "Infantry" || unit.type === "Team") {

      setTimeout(() => {
        const dg = document.querySelector('input[data-upgrade="Defense Gauntlets"]');
        const sk = document.querySelector('input[data-upgrade="Skirmishers"]');

        function updateJackalUpgrades() {
          if (!dg || !sk) return;
          if (dg.checked) {
            sk.checked = false;
            sk.disabled = true;
          } else {
            sk.disabled = false;
          }
          if (sk.checked) {
            dg.checked = false;
            dg.disabled = true;
          } else {
            dg.disabled = false;
          }
        }

        if (dg && sk) {
          dg.addEventListener("change", updateJackalUpgrades);
          sk.addEventListener("change", updateJackalUpgrades);
          updateJackalUpgrades();
        }
      }, 0);
    }
  }
}

// Render Infantry/Team Modal Fields (dynamic doctrine upgrades)
function renderInfantryEditFields(unit, unitData) {
  let html = "";
  if (!unitData) return html;

  // Men: Editable input for Infantry, static label for Team
  if (unit.type === "Infantry") {
    html += `<label>Men: <input type="number" id="editMenInput" min="${unitData.baseMen}" max="${unitData.maxMen}" value="${unit.men}" oninput="updateLiveUnitCost()" /></label>`;
  } else if (unit.type === "Team") {
    html += `<div>Men: <span id="teamMenCount">${typeof unit.men !== "undefined" ? unit.men : unitData.baseMen}</span></div>`;
  }

  // Squad Upgrades (checkboxes)
  if (unitData.options && unitData.options.squadUpgrades) {
    html += `<div style="margin-top:10px;"><b>Squad Upgrades:</b><br>`;
    Object.entries(unitData.options.squadUpgrades).forEach(([label, upgrade]) => {
      let checked = unit.squadUpgrades && unit.squadUpgrades[label] ? "checked" : "";
      let disabled = "";

      if (upgrade.restriction === "notWithDefenseGauntlets" && unit.squadUpgrades && unit.squadUpgrades["Defense Gauntlets"])
        disabled = "disabled";

      if (upgrade.restriction === "noCarbineOrNeedleRifle" &&
        ((unit.weaponReplacements && (unit.weaponReplacements["Carbines"] > 0 || unit.weaponReplacements["Needle Rifles"] > 0))))
        disabled = "disabled";

      html += `<label>
        <input type="checkbox" class="editSquadUpgrade" data-upgrade="${label}" ${checked} ${disabled} onchange="updateLiveUnitCost()">
        ${label} (${Number(upgrade.cost) >= 0 ? "+" : "-"}${Math.abs(Number(upgrade.cost))} pts${upgrade.perModel === false ? " flat" : " per model"}) ${upgrade.grantsRule ? "– Grants: " + upgrade.grantsRule : ""}
      </label><br>`;
    });
    html += `</div>`;
  }

  // Weapon Replacements
  if (unitData.options && unitData.options.weaponReplacements) {
    html += `<div style="margin-top:10px;"><b>Weapon Replacements:</b><br>`;
    Object.entries(unitData.options.weaponReplacements).forEach(([label, spec]) => {
      const curr = (unit.weaponReplacements && unit.weaponReplacements[label]) || 0;
      html += `
        <label>${label}:
          <input type="number" class="editWeaponReplacement" data-label="${label}" min="0" max="${spec.max}" value="${curr}" style="width:40px;" oninput="updateLiveUnitCost()">
          (max ${spec.max}, ${Number(spec.cost) >= 0 ? "+" : "-"}${Math.abs(Number(spec.cost))} pts each)
        </label><br>
      `;
    });
    html += `</div>`;
  }

  // NCO Weapon Replacement
  if (unitData.options && unitData.options.ncoReplacement) {
    const currNCO = unit.ncoReplacement || unitData.options.ncoReplacement.options[0];
    html += `<label style="margin-top:10px;display:block;">NCO Weapon:
      <select id="editNcoReplacement" onchange="updateLiveUnitCost()">`;
    unitData.options.ncoReplacement.options.forEach(opt => {
      html += `<option value="${opt}"${currNCO === opt ? " selected" : ""}>${opt}</option>`;
    });
    html += `</select></label>`;
  }

  // Doctrine (dropdown, dynamic extra upgrades box)
  if (unitData.options && unitData.options.doctrine) {
    html += `
      <div style="margin-top:10px;"><b>${unitData.options.doctrine.label}:</b><br>
        <select id="editDoctrineSelect" onchange="updateLiveUnitCost()">
                    <option value="">— None (${unitData.options.doctrine.defaultLabel || "Default"}) —</option>
          ${unitData.options.doctrine.choices.map(choice => `
            <option value="${choice.name}"${unit.doctrine === choice.name ? " selected" : ""}>
              ${choice.name} (Special: ${choice.specialRules.join(", ")}; +${choice.costPerModel} pts/model)
            </option>
          `).join("")}
        </select>
        <div id="doctrineExtraUpgradesBox"></div>
      </div>
    `;
  }

  // Weapon Loadout Breakdown
  html += `<div style="margin-top:14px;font-size:13px;padding:7px 0;"><b>Current Weapon Loadout:</b><br>`;
  let weaponLines = [];
  try {
    weaponLines = getInfantryWeaponCounts(unit, unitData);
  } catch (e) {
    console.error("getInfantryWeaponCounts error:", e, { unit, unitData });
    weaponLines = ["[Error calculating weapons]"];
  }
  weaponLines.forEach(line => { html += `<div>${line}</div>`; });
  html += `</div>`;

  html += `<div class="cost-preview" id="modalCostPreview"></div>`;
  return html;
}

// Weapon Breakdown Utility (never outputs undefined, always accurate)
function getInfantryWeaponCounts(unit, unitData) {
  let ncoWeapon = unit.ncoReplacement || (unitData.options?.ncoReplacement?.options ? unitData.options.ncoReplacement.options[0] : null);

  // Build a count of all valid weapons (ignore NCO for now)
  let weaponsArray = Array.isArray(unit.weapons) ? unit.weapons.filter(w => w && w.name) : [];
  let weaponCounts = {};
  let validNcoWeapon = false;

  weaponsArray.forEach(w => {
    let name = w.name;
    if (!name) return;
    if (ncoWeapon && name === ncoWeapon) {
      validNcoWeapon = true;
      return; // skip NCO for now
    }
    weaponCounts[name] = (weaponCounts[name] || 0) + 1;
  });

  // Defensive fallback
  if (Object.keys(weaponCounts).length === 0 && (!ncoWeapon || !validNcoWeapon)) {
    return ["[No valid weapons found]"];
  }

  let weaponLines = [];
  for (let [weapon, count] of Object.entries(weaponCounts)) {
    if (count > 0) weaponLines.push(`${count}x ${weapon}`);
  }

  // Always display NCO if present
  if (ncoWeapon) weaponLines.push(`NCO: ${ncoWeapon}`);

  return weaponLines;
}

// Attach dynamic doctrine upgrade checkboxes after modal is rendered
function afterInfantryModalRender(unit, unitData) {

    const doctrineBox = document.getElementById("doctrineExtraUpgradesBox");

    function renderDoctrineExtras() {
      const selectedDoctrine = doctrineChoices.find(dc => dc.name === doctrineSelect.value);

        selectedDoctrine.extraUpgrades.forEach(upg => {

          let label = upg.name;
          if (upg.costPerModel > 0) label += ` (+${upg.costPerModel} pts/model)`;
          if (upg.costFlat > 0) label += ` (+${upg.costFlat} pts flat)`;
          html += `<label><input type="checkbox" class="editDoctrineExtraUpgrade" data-upgrade="${upg.name}" ${checked} onchange="updateLiveUnitCost()"> ${label}</label><br>`;
        });

        cb.addEventListener("change", updateLiveUnitCost);
      });
    }

    doctrineSelect.addEventListener("change", () => {

        updateLiveUnitCost();
      }

      if (checkbox && menCountSpan) {
        checkbox.addEventListener("change", updateMenCount);
        updateMenCount();
      }
    });
  }
}

// VEHICLE MODAL FIELDS, with live preview
function renderVehicleUpgradeFields(unit, unitData) {
  const upgrades = unitData.options?.weaponUpgrades || {};
  let currentSelected = new Set(unit.selectedUpgrades || []);
  const canForceCV = canForceCommandVehicle(unit, unitData);

  function getRequired(set) {
    let required = new Set();

    function addReqs(upgLabel) {
      const upg = upgrades[upgLabel];
      if (!upg || !upg.requires) return;

      const reqs = Array.isArray(upg.requires) ? upg.requires : [upg.requires];
      reqs.forEach(dep => {
        if (dep && !required.has(dep)) {
          required.add(dep);
          addReqs(dep);
        }
      });
    }

    set.forEach(addReqs);
    return required;
  }

  function renderCheckboxes(container, checkedSet) {
    let required = getRequired(checkedSet);
    let allChecked = new Set([...checkedSet, ...required]);

    container.innerHTML = "";

    Object.entries(upgrades).forEach(([label, upg]) => {
      const id = `upg-${Math.random().toString(36).substr(2, 6)}`;
      let checked = allChecked.has(label) ? "checked" : "";
      let disabled = required.has(label) ? "disabled" : "";

      container.innerHTML += `
        <label>
          <input type="checkbox" class="editVehicleUpgrade" value="${label}" id="${id}" ${checked} ${disabled}>
          ${label} (${Number(upg.cost) >= 0 ? "+" : "-"}${Math.abs(Number(upg.cost))} pts)
        </label><br>
      `;
    });

    if (canForceCV) {
      container.innerHTML += `
        <label>
          <input type="checkbox" id="editForcedCommandVehicle" ${unit.forcedCommandVehicle ? "checked" : ""}>
          Force Command Vehicle (+10 pts)
        </label><br>
      `;
    }
  }

  let html = `<div style="margin-top:10px;"><b>Vehicle Upgrades:</b><br><div id="upgradeBoxList"></div></div>`;

  setTimeout(() => {
    const container = document.getElementById("upgradeBoxList");
    renderCheckboxes(container, currentSelected);

    function refresh() {
      let checkedNow = Array.from(container.querySelectorAll('.editVehicleUpgrade:checked')).map(cb => cb.value);
      let required = getRequired(new Set(checkedNow));
      let finalChecked = new Set([...checkedNow, ...required]);
      currentSelected = finalChecked;

      renderCheckboxes(container, currentSelected);
      attach();
      updateLiveUnitCost();
    }

    function attach() {
      container.querySelectorAll('.editVehicleUpgrade').forEach(cb => {
        cb.addEventListener("change", refresh);
      });

      const forced = document.getElementById("editForcedCommandVehicle");
      if (forced) forced.addEventListener("change", updateLiveUnitCost);
    }

    attach();
    updateLiveUnitCost();
  }, 10);

  html += `<div class="cost-preview" id="modalCostPreview"></div>`;
  return html;
}

// Close the edit modal
function closeEditModal() {

}

function saveEdit() {
  if (editIdx == null) return;

  const unit = window.armyList[editIdx];
  const unitData = getUnitData(unit);

  console.log("[saveEdit] Editing unit:", unit?.name, { unit, unitData });
  if (!unit || !unitData) return;

  // INFANTRY & TEAMS
  if (unit.type === "Infantry" || unit.type === "Team") {
    // Men count
    if (unit.type === "Infantry") {
      let val = parseInt(document.getElementById("editMenInput")?.value);
      if (!isNaN(val)) unit.men = val;
    }

    // Squad Upgrades
    if (unitData.options && unitData.options.squadUpgrades) {
      unit.squadUpgrades = {};
      document.querySelectorAll(".editSquadUpgrade").forEach(cb => {
        unit.squadUpgrades[cb.dataset.upgrade] = cb.checked;
      });
    }

    // Weapon Replacements
    if (unitData.options && unitData.options.weaponReplacements) {
      unit.weaponReplacements = {};
      Object.entries(unitData.options.weaponReplacements).forEach(([label]) => {
        const n = parseInt(document.querySelector(`.editWeaponReplacement[data-label="${label}"]`)?.value) || 0;
        unit.weaponReplacements[label] = n;
      });
    }

    // NCO Weapon
    if (unitData.options && unitData.options.ncoReplacement) {
      const ncoReplacement = document.getElementById("editNcoReplacement")?.value;
      if (ncoReplacement) unit.ncoReplacement = ncoReplacement;
    }

    // Doctrine & doctrine extra upgrades
    if (unitData.options && unitData.options.doctrine) {
      const doctrineSelect = document.getElementById("editDoctrineSelect");
      unit.doctrine = doctrineSelect ? doctrineSelect.value : null;

      unit.extraDoctrineUpgrades = {};
      let doctrineSpec = (unitData.options.doctrine.choices || []).find(dc => dc.name === unit.doctrine);

      if (doctrineSpec && doctrineSpec.extraUpgrades) {
        doctrineSpec.extraUpgrades.forEach(upg => {
          let cb = document.querySelector(`.editDoctrineExtraUpgrade[data-upgrade="${upg.name}"]`);
          unit.extraDoctrineUpgrades[upg.name] = !!(cb && cb.checked);
        });
      }
    } else {
      unit.doctrine = null;
      unit.extraDoctrineUpgrades = {};
    }

    // MEN COUNT for TEAMS (handle addMan from upgrades)
    if (unit.type === "Team") {
      let men = unitData.baseMen;
      if (unit.squadUpgrades && unitData.options && unitData.options.squadUpgrades) {
        Object.entries(unit.squadUpgrades).forEach(([label, picked]) => {
          let upgrade = unitData.options.squadUpgrades[label];
          if (picked && upgrade && upgrade.addMan) men += upgrade.addMan;
        });
      }
      unit.men = men;
    }
	// MEN COUNT for INFANTRY (allow addMan upgrades WITHOUT counting toward maxMen)
	if (unit.type === "Infantry") {
	  const baseMenInputRaw = parseInt(document.getElementById("editMenInput")?.value);
	  const baseMenInput = !isNaN(baseMenInputRaw) ? baseMenInputRaw : (unit.men || unitData.baseMen);
	  const baseMenCapped = Math.min(baseMenInput, unitData.maxMen);

	  let bonusMen = 0;
	  if (unit.squadUpgrades && unitData.options?.squadUpgrades) {
		Object.entries(unit.squadUpgrades).forEach(([label, picked]) => {
		  if (!picked) return;
		  const upgrade = unitData.options.squadUpgrades[label];
		  if (upgrade?.addMan) bonusMen += upgrade.addMan;
		});
	  }

	  // commander doesn't count toward maxMen
	  unit.men = baseMenCapped + bonusMen;

	  // store for cost calc (so we don't charge extraMenCost for bonus models)
	  unit._bonusMenNoExtraCost = bonusMen;
	}

    // WEAPONS (robust swaps from squad upgrades)
    let weapons = Array.isArray(unitData.weapons) ? unitData.weapons.map(w => ({ ...w })) : [];
    if (unitData.options && unitData.options.squadUpgrades && unit.squadUpgrades) {
      Object.entries(unitData.options.squadUpgrades).forEach(([label, upgrade]) => {
        if (unit.squadUpgrades[label] && upgrade.grantsRule && upgrade.replacesWeapon) {
          const oldName = upgrade.replacesWeapon.trim().toLowerCase();
          weapons = weapons.filter(w => w.name && w.name.trim().toLowerCase() !== oldName);

          const newName = String(upgrade.grantsRule).trim();
          if (newName && !weapons.some(w => w.name && w.name.trim().toLowerCase() === newName.toLowerCase())) {
            weapons.push({ name: newName });
          }
        }
      });
    }
    unit.weapons = weapons;

    // COST CALCULATION
    let veterancy = unit.veterancy || "Regular";
    let baseCost = (unitData.costs && unitData.costs[veterancy] !== undefined) ? unitData.costs[veterancy] : 0;
    let men = (unit.men !== undefined) ? unit.men : (unitData.baseMen || 0);

	let extraCost = 0;
	if (unit.type !== "Team" && men > unitData.baseMen && unitData.options?.extraMenCost) {
	  const extraMenCost = unitData.options.extraMenCost?.[veterancy] || 0;
	  const bonusFree = unit._bonusMenNoExtraCost || 0;
	  const paidMen = Math.max(unitData.baseMen, men - bonusFree); // don't charge for commander bonus model
	  extraCost = (paidMen - unitData.baseMen) * extraMenCost;
	}

    let squadUpgradesCost = 0;
    if (unit.squadUpgrades && unitData.options && unitData.options.squadUpgrades) {
      Object.entries(unit.squadUpgrades).forEach(([label, picked]) => {
        if (!picked) return;
        let upgrade = unitData.options.squadUpgrades[label];
        if (!upgrade) return;
        squadUpgradesCost += (upgrade.perModel === false)
          ? (upgrade.cost || 0)
          : (upgrade.cost || 0) * men;
      });
    }

    let weaponReplCost = 0;
    if (unit.weaponReplacements && unitData.options?.weaponReplacements) {
      Object.entries(unit.weaponReplacements).forEach(([label, qty]) => {
        let per = unitData.options.weaponReplacements[label]?.cost || 0;
        weaponReplCost += (qty || 0) * per;
      });
    }

    let ncoCost = 0;
    if (unit.ncoReplacement && unitData.options?.ncoReplacement?.costs) {
      ncoCost = unitData.options.ncoReplacement.costs[unit.ncoReplacement] || 0;
    }

    let doctrineCost = 0;
    let extraDoctrineCost = 0;

    // SPECIAL RULES: BASE + DOCTRINE
    let specialRules = Array.isArray(unitData.specialRules) ? [...unitData.specialRules] : [];

    if (unitData.options && unitData.options.doctrine && unit.doctrine) {
      let doctrine = (unitData.options.doctrine.choices || []).find(dc => dc.name === unit.doctrine);
      if (doctrine) {
        doctrineCost += (doctrine.costPerModel || 0) * men;

        specialRules.unshift(unitData.options.doctrine.label + " [" + unit.doctrine + "]");

        (doctrine.specialRules || []).forEach(r => {
          if (r && !specialRules.includes(r)) specialRules.push(r);
        });

        if (unit.extraDoctrineUpgrades && doctrine.extraUpgrades) {
          doctrine.extraUpgrades.forEach(upg => {
            if (!unit.extraDoctrineUpgrades[upg.name]) return;

            if (upg.costPerModel) extraDoctrineCost += upg.costPerModel * men;
            if (upg.costFlat) extraDoctrineCost += upg.costFlat;
            if (upg.cost) extraDoctrineCost += upg.cost * men;

            if (upg.grantsRule && !upg.replacesWeapon && !specialRules.includes(upg.grantsRule)) {
              specialRules.push(upg.grantsRule);
            } else if (!upg.grantsRule && !specialRules.includes(upg.name)) {
              specialRules.push(upg.name);
            }
          });
        }
      }
    }

    // Special rules from squad upgrades (supports string or array), skip weapon swaps
    if (unit.squadUpgrades && unitData.options?.squadUpgrades) {
      Object.entries(unit.squadUpgrades).forEach(([label, picked]) => {
        const upgrade = unitData.options.squadUpgrades[label];
        if (!picked || !upgrade || upgrade.replacesWeapon) return;

        // remove replaced rules (string or array)
        if (upgrade.replacesRule) {
          const toRemove = Array.isArray(upgrade.replacesRule) ? upgrade.replacesRule : [upgrade.replacesRule];
          specialRules = specialRules.filter(r => !(typeof r === "string" && toRemove.includes(r)));
        }

        // add granted rules (string or array)
        const grantList = Array.isArray(upgrade.grantsRule)
          ? upgrade.grantsRule
          : (upgrade.grantsRule ? [upgrade.grantsRule] : []);

        grantList.forEach(rule => {
          if (rule && !specialRules.includes(rule)) specialRules.push(rule);
        });

        if (Array.isArray(upgrade.grantsRules)) {
          upgrade.grantsRules.forEach(rule => {
            if (rule && !specialRules.includes(rule)) specialRules.push(rule);
          });
        }
      });
    }

    // FINALIZE SPECIAL RULES and add doctrine display rules if applicable
    unit.special = specialRules;
    if (unitData.options && unitData.options.doctrine) addDoctrineSpecialRules(unit);

    unit.cost = baseCost + extraCost + squadUpgradesCost + weaponReplCost + ncoCost + doctrineCost + extraDoctrineCost;

    if (isNaN(unit.cost) || unit.cost < 0) unit.cost = 0;
  }

  // VEHICLES: weapon upgrades with forced logic
  if (unit.type !== "Infantry" && unit.type !== "Team") {
    let upgrades = [];
    document.querySelectorAll(".editVehicleUpgrade:checked").forEach(cb => upgrades.push(cb.value));

    const vehicleUpgradesDef = unitData.options?.weaponUpgrades || {};

    let allUpgrades = new Set(upgrades);
    function addReq(upgLabel) {
      const upg = vehicleUpgradesDef[upgLabel];
      if (!upg || !upg.requires) return;
      const reqs = Array.isArray(upg.requires) ? upg.requires : [upg.requires];
      reqs.forEach(dep => {
        if (dep && !allUpgrades.has(dep)) {
          allUpgrades.add(dep);
          addReq(dep);
        }
      });
    }
    upgrades.forEach(addReq);

    unit.selectedUpgrades = Array.from(allUpgrades);

    const forcedCVBox = document.getElementById("editForcedCommandVehicle");
    unit.forcedCommandVehicle = !!(forcedCVBox && forcedCVBox.checked);

    const baseCost = (unitData.costs && unitData.costs[unit.veterancy]) || 0;
    let totalCost = baseCost;
    let weapons = Array.isArray(unitData.weapons) ? unitData.weapons.map(w => ({ ...w })) : [];

    const removeLabels = new Set();
    let addWeapons = [];
    const upgradesCounted = new Set();
    const grantedRules = [];

    unit.selectedUpgrades.forEach(upgLabel => {
      const upg = vehicleUpgradesDef[upgLabel];
      if (!upg || upgradesCounted.has(upgLabel)) return;

      totalCost += (Number(upg.cost) || 0);
      upgradesCounted.add(upgLabel);

      if (upg.replaces) (Array.isArray(upg.replaces) ? upg.replaces : [upg.replaces]).forEach(r => r && removeLabels.add(r));
      if (upg.addsWeapon) (Array.isArray(upg.addsWeapon) ? upg.addsWeapon : [upg.addsWeapon]).forEach(w => w && addWeapons.push({ name: w }));

      if (upg.grantsRule) grantedRules.push(upg.grantsRule);
      if (Array.isArray(upg.grantsRules)) upg.grantsRules.forEach(r => r && grantedRules.push(r));
    });

    if (unit.forcedCommandVehicle) {
      totalCost += 10;
      grantedRules.push("Command Vehicle");
    }

    weapons = weapons.filter(w => !removeLabels.has(w.name));
    addWeapons = addWeapons.filter(newW => !removeLabels.has(newW.name));
    weapons = weapons.concat(addWeapons);

    const baseSpecialFromData = Array.isArray(unitData.specialRules) ? unitData.specialRules.slice() : [];
    const baseSpecialFromUnit = Array.isArray(unit.specialRules) ? unit.specialRules.slice()
      : Array.isArray(unit.special) ? unit.special.slice()
      : [];

    const baseSpecial = baseSpecialFromData.length ? baseSpecialFromData : baseSpecialFromUnit;
    const finalSpecial = Array.from(new Set([...baseSpecial, ...grantedRules]));

    unit.cost = isFinite(totalCost) && totalCost >= 0 ? totalCost : 0;
    unit.weapons = weapons;
    unit.specialRules = finalSpecial;
    unit.special = finalSpecial.slice();

    if (isNaN(unit.cost) || unit.cost < 0) unit.cost = 0;
  }

  // Always rebuild weapons table for HTML/PDF export
  unit.weaponsTable = buildWeaponsTable(unit);

  closeEditModal();
  renderArmyList();
}

function renderArmyList() {
  const listDiv = document.getElementById("armyList");
  listDiv.innerHTML = "";

  (window.armyList || []).forEach((unit, idx) => {
    const dmgText = getDisplayDamage(unit);
    const showDamage = dmgText && String(dmgText).trim() !== "";
    const showTransport = typeof unit.transportCapacity === "number" && unit.transportCapacity > 0;

    // Detect "choose any" (officer/FO/medic/etc)
    const isChooseAny =
      unit.type === "Infantry" &&
      !unit.weaponReplacements &&
      (!unit.options || !unit.options.weaponReplacements) &&
      Array.isArray(unit.weapons) && unit.weapons.length > 1;

    // Weapons block
    let weaponHtml = "";
    if (isChooseAny && unit.men > 1) {
      weaponHtml += `<b>${unit.men}x</b><br>`;
      (unit.weapons || []).forEach(w => {
        let prof = parseWeaponProfile(allWeaponProfiles[getBaseWeaponName(w.name)] || "");
        weaponHtml += `<div style="margin-left:14px;">
          ${w.name} <span style="display:inline-block;width:60px;"></span>
          ${prof.range} <span style="display:inline-block;width:48px;"></span>
          ${prof.shots} <span style="display:inline-block;width:34px;"></span>
          ${prof.pen} <span style="display:inline-block;width:22px;"></span>
          ${prof.special}
        </div>`;
      });
    } else {
      weaponHtml = (Array.isArray(getFinalWeaponsList(unit)) ? getFinalWeaponsList(unit) : [])
        .map(w => w.label)
        .join("<br>");
    }

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <h3>${unit.name} (${unit.veterancy}, ${unit.type})</h3>
      <div class="details">
        ${unit.men ? `<div><b>Men:</b> ${unit.men}</div>` : ""}
        ${showDamage ? `<div><b>Damage:</b> ${dmgText}</div>` : ""}
        ${showTransport ? `<div><b>Transport:</b> ${unit.transportCapacity}</div>` : ""}
        <div><b>Weapons:</b><br>${weaponHtml}</div>
        <div><b>Special Rules:</b>
          <ul style="margin:6px 0 0 16px;padding:0;">
            ${
              (unit.special || []).map(ruleText => {
                const text = typeof ruleText === "string"
                  ? ruleText
                  : ruleText?.name
                    ? ruleText.name + (ruleText.description ? ": " + ruleText.description : "")
                    : "";

                const [rule, ...rest] = text.split(":");
                const extra = rest.join(":").trim();
                const summary =
                  (window.vehicleSpecialDescriptions && window.vehicleSpecialDescriptions[rule.trim()]) ||
                  (window.unitSpecialDescriptions && window.unitSpecialDescriptions[rule.trim()]) ||
                  "";
                const full = (summary ? summary + (extra ? " " : "") : "") + extra;

                return `<li style="margin-bottom:4px;"><b>${rule.trim()}</b>${
                  full ? `: <span style="color:#dde">${full.replace(/\n/g,"<br>")}</span>` : ""
                }</li>`;
              }).join("")
            }
          </ul>
        </div>
		<div><b>Cost:</b> ${unit.cost} pts</div>
		${unit.lockedByArmyBonus
		  ? `<div style="margin-top:10px;color:#b9c6ff;"><b>Army Bonus Unit:</b> ${unit.armyBonusSource} (locked basic squad)</div>`
		  : `
			<button class="edit-btn" onclick="editUnit(${idx})">Edit</button>
			<button class="remove-btn" onclick="removeUnit(${idx})">Remove</button>
		  `
		}
      </div>
    `;
    listDiv.appendChild(card);
  });
  renderSummaryBlock();
  const total = (window.armyList || []).reduce((sum, u) => sum + (Number(u.cost) || 0), 0);
  document.getElementById("totalPointsDiv").innerHTML = `<b>Total Points: ${total}</b>`;
}

// Page break helper (renamed to avoid margin collisions)
const PDF_MARGIN = 36;
const PDF_LINE_HEIGHT = 16;

function checkPageBreak(pdf, y, needed = PDF_LINE_HEIGHT) {
  const pageHeight = pdf.internal.pageSize.getHeight();
  if (y + needed > pageHeight - PDF_MARGIN) {
    pdf.addPage();
    return PDF_MARGIN;
  }
  return y;
}

function setCardFill(pdf) {
  pdf.setFillColor(240, 240, 255);
}

function renderUnitCard(pdf, unit, margin, width, y) {
  const dmgText = getDisplayDamage(unit);
  const hasDamage = dmgText && String(dmgText).trim() !== "";
  const hasTP = typeof unit.transportCapacity === "number" && unit.transportCapacity > 0;
  const weapons = unit.weaponsTable;

  let raw = Array.isArray(unit.special) ? unit.special : (unit.special ? [unit.special] : []);
  raw = raw.map(r =>
    typeof r === "string"
      ? r
      : (r?.name ? r.name + (r.description ? ": " + r.description : "") : "")
  );

  const seen = new Set(), specialArr = [];
  raw.forEach(entry => {
    const rule = String(entry || "").trim();
    if (rule && !seen.has(rule)) {
      seen.add(rule);
      specialArr.push(rule);
    }
  });

  const isChooseAny =
    unit.type === "Infantry" &&
    !unit.weaponReplacements &&
    (!unit.options || !unit.options.weaponReplacements) &&
    Array.isArray(unit.weapons) && unit.weapons.length > 1;

  let blockHeight = 60
    + (hasDamage ? 16 : 0)
    + (hasTP ? 13 : 0)
    + (unit.men ? 10 : 0)
    + 54;

  y = checkPageBreak(pdf, y, blockHeight + 24);
  setCardFill(pdf);
  pdf.roundedRect(margin, y, width, blockHeight, 8, 8, "F");

  let x = margin + 13;
  let yy = y + 22;

  pdf.setFont("helvetica", "bold").setFontSize(13.6).setTextColor(46, 71, 142);
  pdf.text(`${unit.name} (${unit.veterancy}, ${unit.type})`, x, yy);

  yy += 15;
  pdf.setFont("helvetica", "normal").setFontSize(11.5).setTextColor(40, 40, 60);

  if (unit.men) { pdf.text(`Men: ${unit.men}`, x, yy); yy += 13; }
  if (hasDamage) { pdf.text(`Damage: ${dmgText}`, x, yy); yy += 13; }
  if (hasTP) { pdf.text(`Transport: ${unit.transportCapacity}`, x, yy); yy += 13; }

  pdf.setFont("helvetica", "bold");
  pdf.text(`Cost: ${unit.cost} pts`, margin + width - 90, y + 22);

  pdf.setFont("helvetica", "bold").setFontSize(11.3).setTextColor(80, 80, 120);
  yy = checkPageBreak(pdf, yy);
  pdf.text("Weapon", x, yy);
  pdf.text("Range", x + 160, yy);
  pdf.text("Shots", x + 220, yy);
  pdf.text("Pen", x + 265, yy);
  pdf.text("Special", x + 305, yy);
  yy += 7;
  pdf.setDrawColor(170, 170, 230);
  pdf.line(x, yy - 4, x + 420, yy - 4);
  yy += 9;

  pdf.setFont("helvetica", "normal").setFontSize(11).setTextColor(40, 40, 60);

  if (isChooseAny && unit.men > 1) {
    pdf.setFont("helvetica", "bold").setFontSize(13).setTextColor(46, 71, 142);
    yy = checkPageBreak(pdf, yy);
    pdf.text(`${unit.men}x`, x, yy);
    yy += 13;
    pdf.setFont("helvetica", "normal").setFontSize(11).setTextColor(40, 40, 60);

    (unit.weapons || []).forEach(w => {
      let prof = parseWeaponProfile(allWeaponProfiles[getBaseWeaponName(w.name)] || "");
      let labelLines = pdf.splitTextToSize(String(w.name), 150);
      yy = checkPageBreak(pdf, yy);
      pdf.text(labelLines[0], x, yy);
      pdf.text(prof.range, x + 160, yy);
      pdf.text(prof.shots, x + 220, yy);
      pdf.text(prof.pen, x + 265, yy);
      pdf.text(prof.special, x + 305, yy);
      for (let i = 1; i < labelLines.length; i++) {
        yy += 13;
        yy = checkPageBreak(pdf, yy);
        pdf.text(labelLines[i], x, yy);
      }
      yy += 13;
    });
    yy += 3;
  } else {
    (weapons || []).forEach(row => {
      const labelLines = pdf.splitTextToSize(String(row.label || ""), 150);
      yy = checkPageBreak(pdf, yy);
      pdf.text(labelLines[0], x, yy);
      pdf.text(String(row.range || ""), x + 160, yy);
      pdf.text(String(row.shots || ""), x + 220, yy);
      pdf.text(String(row.pen || ""), x + 265, yy);
      pdf.text(String(row.special || ""), x + 305, yy);
      for (let i = 1; i < labelLines.length; i++) {
        yy += 13; yy = checkPageBreak(pdf, yy); pdf.text(labelLines[i], x, yy);
      }
      yy += 16;
    });
  }

  if (specialArr.length) {
    yy += 6;
    pdf.setFont("helvetica", "bold").setFontSize(11.3).setTextColor(80, 80, 120);
    yy = checkPageBreak(pdf, yy);
    pdf.text("Special Rules:", x, yy);
    yy += 13;

    const isVehicle = unit.damageValue !== undefined && unit.type !== "Infantry" && unit.type !== "Team";

    specialArr.forEach(ruleText => {
      const text = String(ruleText || "").trim();
      if (!text) return;

      const [rule, ...rest] = text.split(":");
      const ruleName = rule.trim();
      const extra = rest.join(":").trim();

      const summary = isVehicle
        ? (window.vehicleSpecialDescriptions?.[ruleName] || "")
        : (window.unitSpecialDescriptions?.[ruleName] || "");

      const full = (summary ? summary + (extra ? " " : "") : "") + extra;

      yy = checkPageBreak(pdf, yy, 16);

      // bullet
      pdf.setFont("helvetica", "normal").setFontSize(10.7).setTextColor(40, 40, 60);
      pdf.text("•", x, yy);

      // bold rule name
      pdf.setFont("helvetica", "bold").setFontSize(10.7);
      const ruleLabel = ruleName + ":";
      pdf.text(ruleLabel, x + 10, yy);

      // normal description
      const ruleLabelWidth = pdf.getTextWidth(ruleLabel);
      pdf.setFont("helvetica", "normal").setFontSize(10.7);

      if (full) {
        const firstLineX = x + 10 + ruleLabelWidth + 4;
        const firstLineWidth = margin + width - firstLineX - 10;
        const laterLineWidth = width - 38;

        const wrapped = pdf.splitTextToSize(full, firstLineWidth);

        if (wrapped.length > 0) {
          pdf.text(wrapped[0], firstLineX, yy);
        }

        yy += 12;

        if (wrapped.length > 1) {
          const remainingText = wrapped.slice(1).join(" ");
          const wrappedRest = pdf.splitTextToSize(remainingText, laterLineWidth);
          wrappedRest.forEach(line => {
            yy = checkPageBreak(pdf, yy, 12);
            pdf.text(line, x + 10, yy);
            yy += 12;
          });
        }
      } else {
        yy += 12;
      }

      yy += 2;
    });
  }

  return yy + 8;
}

function renderTotalBlock(pdf, margin, width, y, total) {
  pdf.setDrawColor(90, 160, 230);
  pdf.setFillColor(230, 237, 253);
  pdf.roundedRect(margin, y + 16, width, 35, 8, 8, "F");
  pdf.setFont("helvetica", "bold");
  pdf.setFontSize(16.5);
  pdf.setTextColor(46, 71, 142);
  pdf.text(`TOTAL POINTS: ${total}`, margin + width / 2, y + 38, { align: "center" });
  return y + 60;
}

function renderWeaponSpecialRulesPage(pdf, armyList, margin = 55) {
  let weaponRulesUsed = new Set();

  (armyList || []).forEach(unit => {
    let tableWeapons = Array.isArray(unit.weaponsTable) ? unit.weaponsTable : [];
    tableWeapons.forEach(row => {
      let specials = String(row.special || "");
      specials.split(",").forEach(r => {
        let ruleKey = r.trim().replace(/\s*\(.+\)$/, "");
        if (ruleKey && weaponSpecialDescriptions[ruleKey]) weaponRulesUsed.add(ruleKey);
      });

      if (/\bPaired\b/i.test(String(row.label || ""))) {
        weaponRulesUsed.add("Paired");
      }
    });

    if (
      unit.type === "Infantry" &&
      !unit.weaponReplacements &&
      (!unit.options || !unit.options.weaponReplacements) &&
      Array.isArray(unit.weapons) && unit.weapons.length > 1
    ) {
      unit.weapons.forEach(w => {
        let prof = parseWeaponProfile(allWeaponProfiles[getBaseWeaponName(w.name)] || "");
        (prof.special || "").split(",").forEach(r => {
          let ruleKey = r.trim().replace(/\s*\(.+\)$/, "");
          if (ruleKey && weaponSpecialDescriptions[ruleKey]) weaponRulesUsed.add(ruleKey);
        });

        if (/\bPaired\b/i.test(String(w.name || ""))) {
          weaponRulesUsed.add("Paired");
        }
      });
    }
  });

  if (weaponRulesUsed.size === 0) return;

  pdf.addPage();
  let y = 44;

  pdf.setFont("helvetica", "bold");
  pdf.setFontSize(22);
  pdf.setTextColor(46, 71, 142);
  pdf.text("Special Weapon Rules", margin, y);
  y += 28;

  pdf.setFont("helvetica", "bold");
  pdf.setFontSize(13.5);
  pdf.setTextColor(80, 80, 120);

  let rulesSorted = Array.from(weaponRulesUsed).sort();

  rulesSorted.forEach(rule => {
    pdf.text(rule, margin, y);
    y += 16;

    pdf.setFont("helvetica", "normal");
    pdf.setFontSize(11.7);
    pdf.setTextColor(40, 40, 60);

    let desc = weaponSpecialDescriptions[rule];
    let wrapped = pdf.splitTextToSize(desc, 480);
    wrapped.forEach(line => {
      pdf.text(line, margin + 20, y);
      y += 14;
    });

    y += 7;
    pdf.setFont("helvetica", "bold");
    pdf.setFontSize(13.5);
    pdf.setTextColor(80, 80, 120);

    if (y > 760) {
      pdf.addPage();
      y = 44;
    }
  });
}

function renderArmySpecialRulesPage(pdf, rulesText, margin, width, faction, selectedBonus) {
  pdf.addPage();
  let y = 64;

  pdf.setFont("helvetica", "bold");
  pdf.setFontSize(18);
  pdf.setTextColor(47, 84, 150);
  pdf.text("Army Special Rules", margin, y);
  y += 24;

  if (faction === "Covenant") {
    pdf.setFont("helvetica", "bold");
    pdf.setFontSize(12.5);
    pdf.setTextColor(0, 0, 0);
    pdf.text("Selected Caste System bonus:", margin, y);
    y += 15;

    pdf.setFont("helvetica", "normal");
    pdf.text(selectedBonus || "None", margin + 12, y);
    y += 18;
  }

  const ruleSections = String(rulesText || "")
    .split(/\n(?=[A-Z][A-Za-z0-9 '’\-]+(\n|- Effect:))/)
    .map(s => s.trim())
    .filter(Boolean);

  pdf.setFontSize(12);

  for (const section of ruleSections) {
    const headerMatch = section.match(/^([A-Za-z0-9 '’\-]+)(?:\n|- Effect:)/);
    let header = headerMatch ? headerMatch[1].trim() : null;
    let body = header ? section.slice(header.length).trim() : section.trim();

    if (header) {
      pdf.setFont("helvetica", "bold");
      pdf.setFontSize(14.5);
      pdf.setTextColor(0, 0, 0);
      pdf.text(header, margin, y);
      y += 17;
    }

    let effectRegex = /- Effect:/g;
    let bodyParts = body.split(effectRegex);

    if (bodyParts[0].trim()) {
      pdf.setFont("helvetica", "normal");
      pdf.setFontSize(12);
      pdf.setTextColor(0, 0, 0);
      let wrap = pdf.splitTextToSize(bodyParts[0].trim(), width - 24);
      wrap.forEach(line => {
        pdf.text(line, margin, y);
        y += 15;
      });
    }

    for (let i = 1; i < bodyParts.length; i++) {
      pdf.setFont("helvetica", "bold");
      pdf.setFontSize(12.7);
      pdf.setTextColor(0, 0, 0);
      pdf.text("- Effect:", margin, y);

      pdf.setFont("helvetica", "normal");
      pdf.setFontSize(12);
      pdf.setTextColor(0, 0, 0);

      let eff = bodyParts[i].trim();
      let wrap = pdf.splitTextToSize(eff, width - 24 - 70);

      let start = 0;
      if (wrap.length) {
        pdf.text(wrap[0], margin + 70, y);
        y += 15;
        start = 1;
      }

      for (let j = start; j < wrap.length; j++) {
        pdf.text(wrap[j], margin, y);
        y += 15;
      }
    }

    y += 12;
    if (y > pdf.internal.pageSize.getHeight() - 48) {
      pdf.addPage();
      y = 48;
    }
  }
}

function exportPdf() {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: "pt", format: "a4" });

  // Ensure weaponsTable is up to date for every unit before export
  (window.armyList || []).forEach(unit => {
    unit.weaponsTable = buildWeaponsTable(unit);
  });

  const margin = 38, width = 519;
  let y = margin;

  // Header
  y = renderPdfHeader(pdf, margin, width, y);

  // Units (paginated)
  for (let i = 0; i < (window.armyList || []).length; i++) {
    y = renderUnitCard(pdf, window.armyList[i], margin, width, y);
    if (y > 750) { pdf.addPage(); y = margin; }
  }

  // Total block
  let total = (window.armyList || []).reduce((sum, u) => sum + (Number(u.cost) || 0), 0);
  y = renderTotalBlock(pdf, margin, width, y, total);

  // Special Weapon Rules
  if (typeof renderWeaponSpecialRulesPage === "function") {
    renderWeaponSpecialRulesPage(pdf, window.armyList);
  }

  // Army Special Rules page
  if (window.currentFaction && armyRulesText && armyRulesText[window.currentFaction]) {
    renderArmySpecialRulesPage(
      pdf,
      armyRulesText[window.currentFaction],
      margin,
      width,
      window.currentFaction,
      window.selectedArmyBonus
    );
  }

	const factionSlug = (window.currentFaction || "unknown")
	  .toLowerCase()
	  .replace(/\s+/g, "_");

	const totalPoints = (window.armyList || []).reduce(
	  (sum, u) => sum + (Number(u.cost) || 0),
	  0
	);

	pdf.save(`halo_bolt_action_${factionSlug}_${totalPoints}pts_army_list.pdf`);
}


// =====================
// SAVE LIST TO FILE
// =====================
function saveList() {
	const data = {
	  armyList: window.armyList,
	  currentFaction: window.currentFaction,
	  selectedArmyBonus: window.selectedArmyBonus
	};
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  const factionSlug = (window.currentFaction || "unknown")
  .toLowerCase()
  .replace(/\s+/g, "_");

	const totalPoints = (window.armyList || []).reduce(
	  (sum, u) => sum + (Number(u.cost) || 0),
	  0
	);

	a.download = `halo_bolt_action_${factionSlug}_${totalPoints}pts_army_list.json`;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    document.body.removeChild(a);
    window.URL.revokeObjectURL(url);
  }, 0);
}

// =====================
// LOAD LIST FROM FILE
// =====================
function loadList() {
  let input = document.getElementById("loadFileInput");
  if (!input) {
    input = document.createElement("input");
    input.type = "file";
    input.accept = ".json,application/json";
    input.id = "loadFileInput";
    input.style.display = "none";
    document.body.appendChild(input);
  }

  input.onchange = function (e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function (evt) {
      try {
        const data = JSON.parse(evt.target.result);

        if (!data.armyList || !data.currentFaction) {
          alert("Invalid or incomplete list file!");
          return;
        }

		window.armyList = data.armyList;
		window.currentFaction = data.currentFaction;
		window.selectedArmyBonus = data.selectedArmyBonus || "";

        document.getElementById("btnUNSC").classList.toggle("active", data.currentFaction === "UNSC");
        document.getElementById("btnCovenant").classList.toggle("active", data.currentFaction === "Covenant");
        document.getElementById("btnBanished").classList.toggle("active", data.currentFaction === "Banished");
        if (document.getElementById("btnOther"))
          document.getElementById("btnOther").classList.toggle("active", data.currentFaction === "Other");

        document.getElementById("addControls").style.display = "";
        document.getElementById("factionSelectRow").style.display = "none";
        document.getElementById("sidebar").style.display = "";
        document.getElementById("backBtn").style.display = "";

		updateArmyBonusUI();
		syncArmyBonusEffects();
		populateUnitSelect();
		renderArmyList();
      } catch (err) {
        alert("Error loading file: " + err);
      }
    };

    reader.readAsText(file);
    input.value = "";
  };

  input.click();
}

////////////////////////////////////////////////////////////////////////////////
// 11. EVENT HANDLERS (MISC)
////////////////////////////////////////////////////////////////////////////////

// Single, non-duplicated handler (previous duplicates removed)
document.getElementById("unitSelect").addEventListener("change", updateUnitOptions);

</script>
